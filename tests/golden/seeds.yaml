# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Golden 50 — PR-E (RFC 0001) §125.1 단계 4 + §72.1
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 페르소나 50 케이스. 절대 깨지면 안 되는 보장 라인.
#   사회초년생 20 (g001 ~ g020) — 월세 / 원룸·투룸 / 직장근처·대학가
#   신혼부부   15 (g021 ~ g035) — 전세·매매 / 빌라·아파트 / 학군·출퇴근
#   사업자     15 (g036 ~ g050) — 월세 / 상가·사무실 / 권리금·업종·위치
#
# 단위:
#   deposit  = 만원 (5000 = 5천만원, 30000 = 3억)
#   monthly  = 만원 (50 = 월세 50만원)
#   price    = 만원 (매매만, 전세·월세는 null)
#
# must_include_id / must_exclude_id:
#   단계 4 = 빈 배열 (유연한 expected_min/max_count 만)
#   단계 5 (SQL Oracle) 에서 라이브 DB 결과로 박제
#
# expected_min_count = 1 (탄력 — 데이터 변동 흡수)
# expected_max_count = 라이브 분포 + 50% 마진
#
# 헌법: §72.1 형식 + §125.1 + §96 Phase 1 새 기능 0 + §101 보존 5

cases:
  # ━━━━━━━━ 사회초년생 20 (newcomer) ━━━━━━━━
