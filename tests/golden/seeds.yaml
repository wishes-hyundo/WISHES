    persona: newcomer
    name: 신림 봉천 원룸 월세 50만원 이하 — 관악 학생/직장인
    input:
      type: [원룸]
      deal: [월세]
      gu: [관악구]
      monthly_max: 50
    expected_min_count: 1
    expected_max_count: 5000
    must_include_id: []
    must_exclude_id: []
    sql_oracle: |
      SELECT id FROM listings
      WHERE type_normalized='원룸' AND deal='월세' AND gu='관악구'
        AND monthly <= 50 AND status='공개'

