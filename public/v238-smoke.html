<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>v2.3.8 Smoke Test — 동영상 직업로드 점검</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
         max-width: 560px; margin: 0 auto; padding: 16px; line-height: 1.5; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 16px; }
  label { display: block; margin: 12px 0 4px; font-size: 13px; font-weight: 600; }
  input, button { font-size: 16px; padding: 10px; width: 100%; border-radius: 8px; border: 1px solid #ccc; }
  button { background: #111; color: #fff; border: none; margin-top: 12px; cursor: pointer; }
  button.secondary { background: #555; }
  button:disabled { opacity: 0.5; }
  .log { margin-top: 16px; padding: 12px; background: #f5f5f5; border-radius: 8px;
         font-family: ui-monospace, Menlo, monospace; font-size: 12px;
         white-space: pre-wrap; word-break: break-all; max-height: 50vh; overflow: auto; }
  @media (prefers-color-scheme: dark) {
    .log { background: #1a1a1a; }
    input { background: #222; color: #eee; border-color: #444; }
  }
  .ok { color: #0a7a3a; } .err { color: #b80020; } .info { color: #1e5bd6; }
  .warn { color: #d87000; }
  .step { margin: 4px 0; }
  .bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .bar > i { display: block; height: 100%; background: #0a7a3a; width: 0%; transition: width 0.2s; }
</style>
</head>
<body>
<h1>v2.3.8 Smoke Test</h1>
<div class="sub">Presigned R2 직업로드 전체 플로우 검증. 메인 UI 영향 없음.</div>

<label>관리자 토큰 (비우면 <code>wishes2026</code> 사용)</label>
<input id="token" type="password" placeholder="wishes2026 또는 JWT" />

<label>Listing ID</label>
<input id="listingId" placeholder="예: 12345" />

<label>동영상 파일 (mp4 / mov / webm · 최대 50MB)</label>
<input id="file" type="file" accept="video/mp4,video/quicktime,video/webm,video/x-m4v,video/x-matroska" />

<button id="run">업로드 시작</button>
<button id="diag" class="secondary">진단 엔드포인트 확인 (/api/_diagnostic/r2)</button>

<div class="bar"><i id="bar"></i></div>
<div class="log" id="log">로그 대기 중…</div>

<script>
(function(){
  var $log = document.getElementById('log');
  var $bar = document.getElementById('bar');
  var $run = document.getElementById('run');
  var $diag = document.getElementById('diag');

  function line(msg, cls){
    var div = document.createElement('div');
    div.className = 'step' + (cls ? ' ' + cls : '');
    div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    $log.appendChild(div);
    $log.scrollTop = $log.scrollHeight;
  }
  function clearLog(){ $log.innerHTML = ''; $bar.style.width = '0%'; }
  function getToken(){
    var t = document.getElementById('token').value.trim();
    return t || 'wishes2026';
  }

  $diag.addEventListener('click', async function(){
    clearLog();
    line('진단 엔드포인트 호출…', 'info');
    try {
      var r = await fetch('/api/_diagnostic/r2');
      var data = await r.json();
      line('HTTP '+r.status+' — allOk='+data.allOk, data.allOk ? 'ok' : 'err');
      Object.keys(data.checks).forEach(function(k){
        var c = data.checks[k];
        line((c.ok ? '✓ ' : '✗ ') + k + ' — ' + c.detail, c.ok ? 'ok' : 'err');
      });
      line('hint: '+data.hint, 'info');
    } catch(e){
      line('진단 호출 실패: '+e, 'err');
    }
  });

  $run.addEventListener('click', async function(){
    clearLog();
    var token = getToken();
    var listingId = document.getElementById('listingId').value.trim();
    var file = document.getElementById('file').files[0];
    if (!listingId){ line('Listing ID 필요', 'err'); return; }
    if (!file){ line('파일 선택필요', 'err'); return; }

    line('파일: '+file.name+' ('+(file.size/1024/1024).toFixed(1)+'MB, '+file.type+')', 'info');
    $run.disabled = true;
    try {
      // ① presign
      line('① presign 요청…', 'info');
      var pRes = await fetch('/api/listings/'+encodeURIComponent(listingId)+'/videos/presign', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer '+token,
        },
        body: JSON.stringify({ name: file.name, mime: file.type, size: file.size }),
      });
      if (!pRes.ok){
        var eb = await pRes.json().catch(function(){return{};});
        throw new Error('presign '+pRes.status+': '+(eb.error||'UNKNOWN'));
      }
      var presign = await pRes.json();
      line('✓ presign OK — key='+presign.key, 'ok');

      // ② R2 PUT
      line('② R2 직업로드 (PUT)…', 'info');
      await new Promise(function(resolve, reject){
        var xhr = new XMLHttpRequest();
        xhr.open('PUT', presign.url);
        xhr.setRequestHeader('Content-Type', file.type);
        xhr.timeout = 180000;
        xhr.upload.addEventListener('progress', function(e){
          if (e.lengthComputable){
            var p = Math.round(e.loaded / e.total * 100);
            $bar.style.width = p+'%';
            if (p % 10 === 0 || p === 100) line('  진행 '+p+'% ('+(e.loaded/1024/1024).toFixed(1)+'/'+(e.total/1024/1024).toFixed(1)+'MB)');
          }
        });
        xhr.onload = function(){ (xhr.status >= 200 && xhr.status < 300) ? resolve() : reject(new Error('R2 '+xhr.status)); };
        xhr.onerror = function(){ reject(new Error('R2 네트워크 오류 (CORS 확인)')); };
        xhr.ontimeout = function(){ reject(new Error('R2 타임아웃')); };
        xhr.send(file);
      });
      line('✓ R2 업로드 완료', 'ok');

      // ③ metadata
      line('③ metadata 저장…', 'info');
      var mRes = await fetch('/api/listings/'+encodeURIComponent(listingId)+'/videos/metadata', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer '+token,
        },
        body: JSON.stringify({ key: presign.key, name: file.name, mime: file.type, size: file.size }),
      });
      if (!mRes.ok){
        var em = await mRes.json().catch(function(){return{};});
        throw new Error('metadata '+mRes.status+': '+(em.error||'UNKNOWN'));
      }
      var meta = await mRes.json();
      line('✓ metadata OK — id='+meta.id+' · sort_order='+meta.sort_order, 'ok');
      line('  url: '+meta.url, 'info');
      line('전체 플로우 섰공 🎉 (DB 테이블 listing_videos 에 행이 추가됐어요)', 'ok');
    } catch(e){
      line('✗ 실패: '+(e && e.message || e), 'err');
    } finally {
      $run.disabled = false;
    }
  });
})();
</script>
</body>
</html>
