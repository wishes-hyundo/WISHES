<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2d5016">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192x192.png">
<title>WISHES 모바일 사진등록</title>
<style>
  :root {
    --primary: #2d5016;
    --primary-light: #4a7c2e;
    --accent: #e8a900;
    --bg: #f5f3eb;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-sub: #666666;
    --border: #e0ddd4;
    --success: #10b981;
    --danger: #ef4444;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--primary);
    color: white;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  .header-logo {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), #f0c040);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; opacity: .7; margin-top: 1px; }
  .header-back {
    margin-left: auto;
    background: rgba(255,255,255,.15); border: none; color: white;
    padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
    flex-shrink: 0;
  }

  /* GPS indicator */
  .gps-bar {
    background: #1a2e0a;
    color: #86efac;
    padding: 5px 16px;
    font-size: 11px;
    display: flex; align-items: center; gap: 6px;
  }
  .gps-bar.error { color: #fca5a5; }
  .gps-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    animation: gpsPulse 2s infinite;
    flex-shrink: 0;
  }
  .gps-bar.error .gps-dot { background: #ef4444; animation: none; }
  @keyframes gpsPulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  /* Search Section */
  .search-section {
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .search-box { display: flex; gap: 8px; }
  .search-input {
    flex: 1;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 16px;
    outline: none;
    transition: border-color .2s;
    background: var(--bg);
  }
  .search-input:focus { border-color: var(--primary); }
  .search-input::placeholder { color: #aaa; }
  .search-btn {
    padding: 12px 18px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .search-btn:active { background: var(--primary-light); }
  .search-hint { margin-top: 6px; font-size: 12px; color: var(--text-sub); }

  /* Listing Results */
  .results-section { padding: 10px 16px; }
  .results-count {
    font-size: 13px; color: var(--text-sub);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .results-count strong { color: var(--primary); font-size: 15px; }

  .listing-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 2px solid transparent;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .listing-card:active { transform: scale(.98); }
  .listing-card.selected {
    border-color: var(--primary);
    background: #f0f7ec;
  }
  .listing-id {
    display: inline-block;
    background: var(--primary); color: white;
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 6px;
    margin-bottom: 4px;
  }
  .listing-title {
    font-size: 14px; font-weight: 600;
    line-height: 1.4; margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    padding-right: 80px;
  }
  .listing-info {
    font-size: 12px; color: var(--text-sub);
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .listing-info span { background: var(--bg); padding: 2px 6px; border-radius: 6px; }
  .listing-price {
    position: absolute; right: 14px; top: 12px;
    font-size: 13px; font-weight: 700; color: var(--danger);
  }
  .listing-images-count {
    display: inline-flex; align-items: center; gap: 3px;
    background: #e0f2fe; color: #0369a1;
    padding: 2px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
  }

  /* ===== PHOTO VIEW (shown after selecting a listing) ===== */
  .photo-view { display: none; }
  .photo-view.active { display: block; }

  .photo-view-header {
    background: white;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .pv-back {
    background: var(--bg); border: none;
    width: 36px; height: 36px; border-radius: 10px;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .pv-back:active { background: var(--border); }
  .pv-listing-info { flex: 1; min-width: 0; }
  .pv-listing-name {
    font-size: 14px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pv-listing-addr { font-size: 12px; color: var(--text-sub); }

  /* Upload Buttons - always visible at top of photo view */
  .pv-upload-btns {
    padding: 12px 16px;
    display: flex; gap: 10px;
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .pv-btn {
    flex: 1; padding: 14px;
    border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .pv-btn:active { transform: scale(.97); }
  .pv-btn.camera { background: var(--accent); color: var(--text); }
  .pv-btn.gallery { background: var(--primary); color: white; }

  /* Pending photos (new photos to upload) */
  .pv-pending { padding: 12px 16px; }
  .pv-pending.hidden { display: none; }
  .pv-pending-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .pv-pending-title { font-size: 14px; font-weight: 600; }
  .pv-upload-action {
    padding: 10px 20px;
    background: var(--success); color: white;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
  }
  .pv-upload-action:disabled { background: #ccc; }
  .pv-upload-action:active { transform: scale(.97); }

  .pv-pending-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .pv-thumb {
    position: relative; aspect-ratio: 1;
    border-radius: 10px; overflow: hidden; background: #eee;
  }
  .pv-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .pv-thumb-remove {
    position: absolute; top: 4px; right: 4px;
    width: 24px; height: 24px;
    background: rgba(0,0,0,.6); color: white;
    border: none; border-radius: 50%;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .pv-thumb-size {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,.5); color: #86efac;
    font-size: 9px; font-weight: 700;
    padding: 2px 5px; border-radius: 4px;
  }

  /* Existing photos */
  .pv-existing { padding: 12px 16px; }
  .pv-existing.hidden { display: none; }
  .pv-existing-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .pv-existing-title { font-size: 14px; font-weight: 600; }
  .pv-save-order {
    padding: 8px 14px;
    background: var(--primary); color: white;
    border: none; border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    display: none;
  }
  .pv-save-order.show { display: flex; align-items: center; gap: 4px; }
  .pv-save-order:active { transform: scale(.97); }

  .pv-existing-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .pv-existing-item {
    position: relative; aspect-ratio: 1;
    border-radius: 10px; overflow: hidden; background: #eee;
    border: 2px solid var(--border);
  }
  .pv-existing-item img { width: 100%; height: 100%; object-fit: cover; }
  .pv-existing-item.dragging { opacity: .4; }
  .pv-existing-item.drag-over { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(45,80,22,.3); }
  .pv-star {
    position: absolute; top: 3px; left: 3px;
    background: rgba(0,0,0,.55); color: #fbbf24;
    font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
  }
  .pv-order-num {
    position: absolute; bottom: 3px; right: 3px;
    background: rgba(0,0,0,.5); color: white;
    font-size: 10px; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .pv-drag-hint {
    margin-top: 8px;
    font-size: 11px; color: var(--text-sub);
    text-align: center;
  }

  /* Upload Log */
  .pv-log { padding: 12px 16px; display: none; }
  .pv-log.show { display: block; }
  .pv-log-title { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
  .log-item {
    display: flex; gap: 8px; padding: 8px 10px;
    background: white; border-radius: 8px;
    margin-bottom: 6px; font-size: 12px;
    border-left: 3px solid var(--success);
  }
  .log-item.error { border-left-color: var(--danger); }
  .log-icon { font-size: 14px; flex-shrink: 0; }
  .log-body { flex: 1; min-width: 0; }
  .log-title { font-weight: 600; margin-bottom: 2px; }
  .log-detail { color: var(--text-sub); line-height: 1.4; word-break: break-all; }
  .log-detail.error-detail { color: var(--danger); }
  .log-time { color: #aaa; font-size: 10px; margin-top: 3px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-sub); }
  .empty-state .icon { font-size: 42px; margin-bottom: 10px; }
  .empty-state .title { font-size: 15px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
  .empty-state .desc { font-size: 13px; line-height: 1.6; }

  /* Toast */
  .toast {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1a1a1a; color: white;
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    z-index: 200; opacity: 0;
    transition: all .3s; pointer-events: none;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  .toast.info { background: var(--primary); }

  /* Progress - blocking overlay for compression */
  .progress-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .progress-overlay.show { opacity: 1; pointer-events: all; }
  .progress-box {
    background: white; padding: 28px;
    border-radius: 20px; text-align: center;
    min-width: 260px;
  }
  .progress-spinner {
    width: 44px; height: 44px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-text { font-size: 15px; font-weight: 600; }
  .progress-sub { font-size: 12px; color: var(--text-sub); margin-top: 5px; }
  .progress-detail { font-size: 11px; color: var(--primary); margin-top: 6px; font-weight: 600; }

  /* Upload Progress Bar - non-blocking floating bar */
  .upload-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(0,0,0,.12);
    z-index: 250;
    transform: translateY(100%);
    transition: transform .3s ease;
  }
  .upload-bar.show { transform: translateY(0); }
  .upload-bar-inner {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
  }
  .upload-bar-spinner {
    width: 28px; height: 28px; flex-shrink: 0;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  .upload-bar.done .upload-bar-spinner {
    border: none; animation: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .upload-bar-content { flex: 1; min-width: 0; }
  .upload-bar-title { font-size: 14px; font-weight: 600; }
  .upload-bar-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  .upload-bar-progress {
    height: 4px; background: var(--border);
    border-radius: 2px; margin-top: 6px; overflow: hidden;
  }
  .upload-bar-fill {
    height: 100%; background: var(--primary);
    border-radius: 2px;
    transition: width .3s ease;
    width: 0%;
  }
  .upload-bar.done .upload-bar-fill { background: var(--success); }
  .upload-bar-close {
    background: none; border: none; font-size: 20px;
    color: var(--text-sub); cursor: pointer; padding: 4px;
    flex-shrink: 0;
  }

  /* Pending photo reorder arrows */
  .pv-thumb-arrows {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    background: linear-gradient(transparent, rgba(0,0,0,.6));
    padding: 12px 4px 4px;
  }
  .pv-thumb-arrow {
    background: rgba(255,255,255,.9); border: none;
    width: 26px; height: 26px; border-radius: 50%;
    font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  .pv-thumb-arrow:active { transform: scale(.9); }
  .pv-thumb-arrow.hidden { visibility: hidden; }
  .pv-thumb-order {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,.5); color: white;
    font-size: 10px; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* Skeleton */
  .skeleton {
    background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius);
    height: 72px; margin-bottom: 8px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  input[type="file"] { display: none; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">📷</div>
  <div>
    <div class="header-title">WISHES 모바일 사진등록</div>
    <div class="header-sub">매물을 검색하고 사진을 바로 등록하세요</div>
  </div>
  <button class="header-back" onclick="window.location.href='/admin?tab=search'">← 관리자</button>
</div>

<!-- GPS Bar -->
<div class="gps-bar" id="gpsBar">
  <div class="gps-dot"></div>
  <span id="gpsStatus">GPS 위치 확인 중...</span>
</div>

<!-- ===== SEARCH VIEW ===== -->
<div id="searchView">
  <div class="search-section">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput"
             placeholder="건물명, 주소, 매물ID 검색..."
             enterkeyhint="search" autocomplete="off">
      <button class="search-btn" id="searchBtn" onclick="searchListings()">검색</button>
    </div>
    <div class="search-hint" id="searchHint">💡 건물명, 주소, 매물번호로 검색할 수 있습니다</div>
  </div>
  <div class="results-section" id="resultsSection">
    <div class="empty-state" id="emptyState">
      <div class="icon">🏠</div>
      <div class="title">매물을 검색해주세요</div>
      <div class="desc">건물명, 주소 또는 매물번호를<br>검색하면 사진을 등록할 수 있습니다</div>
    </div>
    <div id="resultsList"></div>
  </div>
</div>

<!-- ===== PHOTO VIEW (replaces search view when listing selected) ===== -->
<div class="photo-view" id="photoView">
  <!-- Selected listing header -->
  <div class="photo-view-header">
    <button class="pv-back" onclick="backToSearch()">←</button>
    <div class="pv-listing-info">
      <div class="pv-listing-name" id="pvName">-</div>
      <div class="pv-listing-addr" id="pvAddr">-</div>
    </div>
  </div>

  <!-- Camera / Gallery buttons - always visible -->
  <div class="pv-upload-btns">
    <button class="pv-btn camera" onclick="openCamera()">📷 카메라 촬영</button>
    <button class="pv-btn gallery" onclick="openGallery()">🖼️ 갤러리 선택</button>
  </div>

  <!-- NEW photos to upload -->
  <div class="pv-pending hidden" id="pvPending">
    <div class="pv-pending-header">
      <span class="pv-pending-title" id="pvPendingTitle">📸 새 사진 0장</span>
      <button class="pv-upload-action" id="pvUploadBtn" onclick="uploadImages()" disabled>⬆️ 업로드</button>
    </div>
    <div class="pv-pending-grid" id="pvPendingGrid"></div>
  </div>

  <!-- EXISTING photos with reorder -->
  <div class="pv-existing hidden" id="pvExisting">
    <div class="pv-existing-header">
      <span class="pv-existing-title" id="pvExistingTitle">📌 등록된 사진 0장</span>
      <button class="pv-save-order" id="pvSaveOrder" onclick="saveImageOrder()">💾 순서 저장</button>
    </div>
    <div class="pv-existing-grid" id="pvExistingGrid"></div>
    <div class="pv-drag-hint">길게 눌러 드래그하면 순서 변경 · ⭐ = 대표사진</div>
  </div>

  <!-- Upload Log -->
  <div class="pv-log" id="pvLog">
    <div class="pv-log-title">📋 업로드 기록</div>
    <div id="pvLogList"></div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="cameraInput" accept="image/*" capture="environment">
<input type="file" id="galleryInput" accept="image/*" multiple>

<div class="toast" id="toast"></div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="progress-spinner"></div>
    <div class="progress-text" id="progressText">사진 처리 중...</div>
    <div class="progress-sub" id="progressSub">잠시만 기다려주세요</div>
    <div class="progress-detail" id="progressDetail"></div>
  </div>
</div>

<!-- Non-blocking upload progress bar -->
<div class="upload-bar" id="uploadBar">
  <div class="upload-bar-inner">
    <div class="upload-bar-spinner" id="uploadBarSpinner"></div>
    <div class="upload-bar-content">
      <div class="upload-bar-title" id="uploadBarTitle">업로드 중...</div>
      <div class="upload-bar-sub" id="uploadBarSub"></div>
      <div class="upload-bar-progress"><div class="upload-bar-fill" id="uploadBarFill"></div></div>
    </div>
    <button class="upload-bar-close" id="uploadBarClose" onclick="closeUploadBar()" style="display:none;">✕</button>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const AUTH_TOKEN = 'wishes2026';
const DEBUG = location.hostname === 'localhost' || location.search.includes('debug=1');

let allListings = [];
let selectedListing = null;
let pendingFiles = []; // { file, originalSize, compressedSize, gps }
let existingImagesData = [];
let orderChanged = false;
let isLoading = false;
let dragHintShown = false;

function log(...args) { if (DEBUG) console.log('[WISHES]', ...args); }
function logErr(label, err) { if (DEBUG) console.error('[WISHES]', label, err); }

// ===== UNIFIED API HELPER =====
async function apiCall(url, options = {}) {
  const { method = 'GET', body, timeout = 30000, json = true } = options;
  const headers = { 'Authorization': `Bearer ${AUTH_TOKEN}` };
  if (json && body && !(body instanceof FormData)) headers['Content-Type'] = 'application/json';

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);

  try {
    const res = await fetch(url, {
      method,
      headers,
      body: body instanceof FormData ? body : (body ? JSON.stringify(body) : undefined),
      signal: controller.signal
    });
    clearTimeout(timer);

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      const msg = data.error || data.message || `서버 오류 (HTTP ${res.status})`;
      return { ok: false, status: res.status, error: msg, data: null };
    }

    const data = await res.json();
    if (data.success === false) {
      return { ok: false, status: res.status, error: data.error || '요청 처리 실패', data };
    }
    return { ok: true, status: res.status, error: null, data };
  } catch (e) {
    clearTimeout(timer);
    let msg = e.message;
    if (e.name === 'AbortError') msg = '요청 시간 초과 (네트워크 상태를 확인해주세요)';
    else if (msg.includes('Failed to fetch') || msg.includes('NetworkError'))
      msg = '네트워크 연결을 확인해주세요';
    logErr('API', e);
    return { ok: false, status: 0, error: msg, data: null };
  }
}

// ===== GPS =====
let currentGPS = null;
let gpsWatchId = null;

function initGPS() {
  const bar = document.getElementById('gpsBar');
  const status = document.getElementById('gpsStatus');

  if (!navigator.geolocation) {
    bar.classList.add('error');
    status.textContent = 'GPS 미지원 기기';
    return;
  }

  gpsWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      currentGPS = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: Math.round(pos.coords.accuracy),
        timestamp: new Date().toISOString()
      };
      bar.classList.remove('error');
      status.textContent = `📍 ${currentGPS.lat.toFixed(5)}, ${currentGPS.lng.toFixed(5)} (±${currentGPS.accuracy}m)`;
    },
    (err) => {
      bar.classList.add('error');
      if (err.code === 1) status.textContent = '위치 권한이 거부되었습니다. 설정에서 허용해주세요';
      else if (err.code === 2) status.textContent = 'GPS 신호를 찾을 수 없습니다';
      else status.textContent = 'GPS 위치 확인 실패';
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 }
  );
}

// ===== IMAGE COMPRESSION =====
const MAX_DIM = 1920;
const QUALITY = 0.82;
const MAX_FILE_SIZE = 2 * 1024 * 1024;

function compressImage(file) {
  return new Promise((resolve) => {
    if (file.size <= MAX_FILE_SIZE && file.type === 'image/jpeg') {
      resolve({ compressed: file, originalSize: file.size, compressedSize: file.size });
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > MAX_DIM || height > MAX_DIM) {
          const r = Math.min(MAX_DIM / width, MAX_DIM / height);
          width = Math.round(width * r);
          height = Math.round(height * r);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          if (blob) {
            const f = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg', lastModified: file.lastModified });
            resolve({ compressed: f, originalSize: file.size, compressedSize: f.size });
          } else {
            resolve({ compressed: file, originalSize: file.size, compressedSize: file.size });
          }
        }, 'image/jpeg', QUALITY);
      };
      img.onerror = () => resolve({ compressed: file, originalSize: file.size, compressedSize: file.size });
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function formatBytes(b) {
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b / 1024).toFixed(0) + 'KB';
  return (b / 1048576).toFixed(1) + 'MB';
}

async function loadRecentListings() {

async function searchListings() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) { showToast('검색어를 입력해주세요', 'error'); return; }

  showLoading(true);
  document.getElementById('searchBtn').textContent = '검색중...';

  try {
    if (allListings.length < 100) {
      let offset = 0, batch;
      allListings = [];
      do {
        const result = await apiCall(`${API_BASE}/api/listings?limit=1000&offset=${offset}`, { timeout: 60000 });
        if (!result.ok) { showToast('매물 데이터 로드 실패: ' + result.error, 'error'); break; }
        batch = result.data?.data || [];
        allListings = allListings.concat(batch);
        offset += 1000;
      } while (batch.length === 1000);
    }

    const q = query.toLowerCase();
    const idMatch = q.match(/w?-?(\d{3,})/i);
    let results;
    if (idMatch) {
      const searchId = parseInt(idMatch[1]);
      results = allListings.filter(l => l.id === searchId);
    } else {
      results = allListings.filter(l => {
        return [l.title, l.address, l.address_detail, l.dong, l.building_info, String(l.id)]
          .filter(Boolean).join(' ').toLowerCase().includes(q);
      });
    }

    renderListings(results.slice(0, 50), `"${query}" 검색 결과`);
    document.getElementById('searchHint').innerHTML =
      `🔍 <strong>${results.length}건</strong> 검색됨 ${results.length > 50 ? '(상위 50건 표시)' : ''}`;
  } catch(e) {
    showToast('검색 중 오류가 발생했습니다', 'error');
    logErr('search', e);
  }

  document.getElementById('searchBtn').textContent = '검색';
  showLoading(false);
}

function renderListings(listings, label) {
  const container = document.getElementById('resultsList');
  const empty = document.getElementById('emptyState');

  if (listings.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    empty.querySelector('.title').textContent = '검색 결과가 없습니다';
    empty.querySelector('.desc').textContent = '다른 검색어로 시도해보세요';
    return;
  }
  empty.style.display = 'none';

  container.innerHTML = `<div class="results-count">📋 ${label} <strong>${listings.length}건</strong></div>` +
    listings.map(l => {
      const imageCount = (l.listing_images || []).length;
      const price = formatPrice(l);
      return `
        <div class="listing-card" onclick="selectListing(${l.id})" data-id="${l.id}">
          <span class="listing-id">매물 ${l.id}</span>
          ${imageCount > 0 ? `<span class="listing-images-count">📷 ${imageCount}장</span>` : ''}
          <div class="listing-title">${escHtml(l.address || l.title || '제목 없음')}</div>
          <div class="listing-info">
            ${l.title && l.address ? `<span>${escHtml(l.title)}</span>` : ''}
            ${l.type ? `<span>${l.type}</span>` : ''}
            ${l.deal ? `<span>${l.deal}</span>` : ''}
            ${l.area_m2 ? `<span>${l.area_m2}㎡</span>` : ''}
          </div>
          <div class="listing-price">${price}</div>
        </div>`;
    }).join('');
}

function formatPrice(l) {
  if (l.deposit && l.monthly) return `${fmtN(l.deposit)}/${fmtN(l.monthly)}`;
  if (l.price) return fmtN(l.price);
  if (l.deposit) return fmtN(l.deposit);
  return '';
}
function fmtN(n) {
  if (!n) return '0';
  n = Number(n);
  if (n >= 10000) return (n / 10000).toFixed(n % 10000 ? 1 : 0) + '억';
  return n.toLocaleString() + '만';
}

// ===== DRAG & DROP (Desktop) =====
let dragSrcIndex = null;

function onDragStart(e, i) {
  dragSrcIndex = i;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const item = e.target.closest('.pv-existing-item');
  if (item) {
    document.querySelectorAll('.pv-existing-item').forEach(el => el.classList.remove('drag-over'));
    item.classList.add('drag-over');
  }
}
function onDrop(e, targetIdx) {
  e.preventDefault();
  document.querySelectorAll('.pv-existing-item').forEach(el => el.classList.remove('drag-over'));
  if (dragSrcIndex !== null && dragSrcIndex !== targetIdx) {
    const moved = existingImagesData.splice(dragSrcIndex, 1)[0];
    existingImagesData.splice(targetIdx, 0, moved);
    orderChanged = true;
    renderExistingImages();
  }
}
function onDragEnd(e) {
  document.querySelectorAll('.pv-existing-item').forEach(el => {
    el.classList.remove('dragging');
    el.classList.remove('drag-over');
  });
  dragSrcIndex = null;
}

// ===== DRAG & DROP (Mobile Touch) =====
let touchIdx = null;
let touchClone = null;
let touchStartX = 0, touchStartY = 0;
let longPressTimer = null;
let touchActive = false;

function onTouchStart(e, idx) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchIdx = idx;
  touchActive = false;

  longPressTimer = setTimeout(() => {
    touchActive = true;
    const item = e.target.closest('.pv-existing-item');
    if (!item) return;
    item.classList.add('dragging');

    const rect = item.getBoundingClientRect();
    touchClone = item.cloneNode(true);
    touchClone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;z-index:500;opacity:.85;pointer-events:none;border:2px solid var(--primary);box-shadow:0 8px 30px rgba(0,0,0,.25);`;
    document.body.appendChild(touchClone);

    if (navigator.vibrate) navigator.vibrate(30);
  }, 400);
}

function onTouchMove(e) {
  if (!touchActive) {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) clearTimeout(longPressTimer);
    return;
  }
  e.preventDefault();
  const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
  if (touchClone) {
    touchClone.style.left = (tx - touchClone.offsetWidth / 2) + 'px';
    touchClone.style.top = (ty - touchClone.offsetHeight / 2) + 'px';
  }
  document.querySelectorAll('.pv-existing-item').forEach(el => el.classList.remove('drag-over'));
  const t = document.elementFromPoint(tx, ty);
  const ti = t ? t.closest('.pv-existing-item') : null;
  if (ti) ti.classList.add('drag-over');
}

function onTouchEnd(e) {
  clearTimeout(longPressTimer);
  if (touchActive && touchClone) {
    const touch = e.changedTouches[0];
    touchClone.remove();
    touchClone = null;

    const t = document.elementFromPoint(touch.clientX, touch.clientY);
    const ti = t ? t.closest('.pv-existing-item') : null;
    if (ti) {
      const targetIdx = parseInt(ti.dataset.index);
      if (touchIdx !== null && touchIdx !== targetIdx) {
        const moved = existingImagesData.splice(touchIdx, 1)[0];
        existingImagesData.splice(targetIdx, 0, moved);
        orderChanged = true;
      }
    }
  }

  document.querySelectorAll('.pv-existing-item').forEach(el => {
    el.classList.remove('dragging');
    el.classList.remove('drag-over');
  });

  if (touchActive) renderExistingImages();
  touchActive = false;
  touchIdx = null;
}

function openGallery() {

async function handleFiles(e) {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;

  showProgress(true, '사진 처리 중...', `${files.length}장 압축 중`);

  let added = 0;
  for (const file of files) {
    if (!file.type.startsWith('image/') && !file.name.match(/\.(jpg|jpeg|png|heic|heif|webp)$/i)) continue;
    if (pendingFiles.length >= 20) {
      showToast('최대 20장까지 선택 가능', 'error');
      break;
    }

    try {
      const { compressed, originalSize, compressedSize } = await compressImage(file);
      pendingFiles.push({
        file: compressed,
        originalSize,
        compressedSize,
        gps: currentGPS ? { ...currentGPS } : null
      });
      added++;
      document.getElementById('progressDetail').textContent = `${added}/${files.length} 완료`;
    } catch (err) {
      logErr('compress', err);
    }
  }

  showProgress(false);
  updatePendingUI();
  e.target.value = '';

  if (added > 0) {
    const totalOrig = pendingFiles.reduce((s, f) => s + f.originalSize, 0);
    const totalComp = pendingFiles.reduce((s, f) => s + f.compressedSize, 0);
    const saved = totalOrig - totalComp;
    if (saved > 100000) {
      showToast(`${added}장 추가 (${formatBytes(saved)} 절약)`, 'success');
    } else {
      showToast(`${added}장 추가됨 (총 ${pendingFiles.length}장)`, 'success');
    }
  }
}

function updatePendingUI() {
  const section = document.getElementById('pvPending');
  const grid = document.getElementById('pvPendingGrid');
  const title = document.getElementById('pvPendingTitle');
  const btn = document.getElementById('pvUploadBtn');

  if (pendingFiles.length === 0) {
    section.classList.add('hidden');
    return;
  }

  section.classList.remove('hidden');
  title.textContent = `📸 새 사진 ${pendingFiles.length}장`;
  btn.disabled = isUploading;
  btn.textContent = isUploading ? '⏳ 업로드 중...' : '⬆️ 업로드';

  grid.innerHTML = pendingFiles.map((pf, i) => `
    <div class="pv-thumb" draggable="true" data-pidx="${i}"
         ondragstart="onPendDragStart(event,${i})" ondragover="onPendDragOver(event)" ondrop="onPendDrop(event,${i})" ondragend="onPendDragEnd(event)"
         ontouchstart="onPendTouchStart(event,${i})" ontouchmove="onPendTouchMove(event)" ontouchend="onPendTouchEnd(event)">
      <img src="${URL.createObjectURL(pf.file)}" alt="미리보기">
      <button class="pv-thumb-remove" onclick="event.stopPropagation();removeFile(${i})">✕</button>
      <span class="pv-thumb-size">${formatBytes(pf.compressedSize)}</span>
      ${pendingFiles.length > 1 ? `<div class="pv-thumb-order">${i + 1}</div>` : ''}
      ${pendingFiles.length > 1 ? `<div class="pv-thumb-arrows">
        <button class="pv-thumb-arrow ${i === 0 ? 'hidden' : ''}" onclick="event.stopPropagation();movePending(${i},-1)">◀</button>
        <button class="pv-thumb-arrow ${i === pendingFiles.length - 1 ? 'hidden' : ''}" onclick="event.stopPropagation();movePending(${i},1)">▶</button>
      </div>` : ''}
    </div>`).join('');
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  updatePendingUI();
}

function movePending(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= pendingFiles.length) return;
  const tmp = pendingFiles[idx];
  pendingFiles[idx] = pendingFiles[newIdx];
  pendingFiles[newIdx] = tmp;
  updatePendingUI();
}

let pendDragIdx = null;

// ===== PENDING DRAG & DROP (Mobile Touch) =====
let pendTouchIdx = null;
let pendTouchClone = null;
let pendTouchStartX = 0, pendTouchStartY = 0;
let pendLongPress = null;
let pendTouchActive = false;

function onPendTouchStart(e, idx) {
  pendTouchStartX = e.touches[0].clientX;
  pendTouchStartY = e.touches[0].clientY;
  pendTouchIdx = idx;
  pendTouchActive = false;

  pendLongPress = setTimeout(() => {
    pendTouchActive = true;

    const rect = item.getBoundingClientRect();

    document.body.appendChild(pendTouchClone);
    if (navigator.vibrate) navigator.vibrate(30);
  }, 400);
}

function onPendTouchMove(e) {
  if (!pendTouchActive) {
    const dx = e.touches[0].clientX - pendTouchStartX;
    const dy = e.touches[0].clientY - pendTouchStartY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) clearTimeout(pendLongPress);
    return;
  }
  e.preventDefault();
  const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
  if (pendTouchClone) {
    pendTouchClone.style.left = (tx - pendTouchClone.offsetWidth / 2) + 'px';
    pendTouchClone.style.top = (ty - pendTouchClone.offsetHeight / 2) + 'px';
  }
}

function onPendTouchEnd(e) {
  clearTimeout(pendLongPress);
  if (pendTouchActive && pendTouchClone) {
    const touch = e.changedTouches[0];
    pendTouchClone.remove();
    pendTouchClone = null;

    const t = document.elementFromPoint(touch.clientX, touch.clientY);
    const ti = t ? t.closest('.pv-thumb') : null;
    if (ti) {
      const targetIdx = parseInt(ti.dataset.pidx);
      if (pendTouchIdx !== null && pendTouchIdx !== targetIdx) {
        const moved = pendingFiles.splice(pendTouchIdx, 1)[0];
        pendingFiles.splice(targetIdx, 0, moved);
      }
    }
  }

  document.querySelectorAll('.pv-thumb').forEach(el => el.style.opacity = '');
  if (pendTouchActive) updatePendingUI();
  pendTouchActive = false;
  pendTouchIdx = null;
}

// ===== UPLOAD (Background - Non-blocking) =====
let isUploading = false;
async function uploadImages() {
  if (!selectedListing || pendingFiles.length === 0 || isUploading) return;

  isUploading = true;
  const uploadListingId = selectedListing.id;
  const uploadListingTitle = selectedListing.title || `매물 ${uploadListingId}`;
  const filesToUpload = [...pendingFiles];
  const totalSize = filesToUpload.reduce((s, f) => s + f.compressedSize, 0);
  const count = filesToUpload.length;

  // Clear pending immediately so user can keep working
  pendingFiles = [];
  updatePendingUI();

  // Show non-blocking upload bar
  showUploadBar(`${uploadListingTitle} 사진 업로드 중`, `${count}장 · ${formatBytes(totalSize)}`, 10);

  const startTime = Date.now();

  // Use XMLHttpRequest for progress tracking
  const formData = new FormData();
  filesToUpload.forEach(pf => formData.append('images', pf.file));
  const metadata = filesToUpload.map(pf => ({
    gps: pf.gps,
    originalSize: pf.originalSize,
    compressedSize: pf.compressedSize,
  }));
  formData.append('metadata', JSON.stringify(metadata));

  try {
    const result = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${API_BASE}/api/listings/${uploadListingId}/images`);
      xhr.setRequestHeader('Authorization', `Bearer ${AUTH_TOKEN}`);
      xhr.timeout = 180000; // 3분 타임아웃

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          updateUploadBar(`${uploadListingTitle} 업로드 중`, `${count}장 · ${pct}% (${formatBytes(e.loaded)}/${formatBytes(e.total)})`, pct);
        }
      };

      xhr.onload = () => {
        try {
          const data = JSON.parse(xhr.responseText);
          if (xhr.status >= 200 && xhr.status < 300 && data.success !== false) {
            resolve({ ok: true, data });
          } else {
            resolve({ ok: false, error: data.error || `서버 오류 (HTTP ${xhr.status})` });
          }
        } catch(e) {
          resolve({ ok: false, error: `응답 파싱 오류` });
        }
      };

      xhr.onerror = () => resolve({ ok: false, error: '네트워크 오류' });
      xhr.ontimeout = () => resolve({ ok: false, error: '업로드 시간 초과' });
      xhr.send(formData);
    });

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    if (result.ok) {
      const origT = filesToUpload.reduce((s, f) => s + f.originalSize, 0);
      const compT = filesToUpload.reduce((s, f) => s + f.compressedSize, 0);
      const pct = origT > 0 ? Math.round((1 - compT / origT) * 100) : 0;

      completeUploadBar(`✅ ${count}장 업로드 완료!`, `${formatBytes(compT)}${pct > 5 ? ` · ${pct}% 절약` : ''} · ${elapsed}초`);
      addLog('success', `매물 ${uploadListingId} 사진 ${count}장 업로드`,
        `용량: ${formatBytes(compT)}${pct > 5 ? ` (${pct}% 절약)` : ''} · ${elapsed}초`);

      // Refresh existing images if still on the same listing
      if (selectedListing && selectedListing.id === uploadListingId) {
        await loadExistingImages(uploadListingId);
      }
    } else {
      completeUploadBar(`❌ 업로드 실패`, result.error, true);
      addLog('error', `매물 ${uploadListingId} 업로드 실패`, `${result.error} · ${elapsed}초`);
    }
  } catch(e) {
    completeUploadBar(`❌ 업로드 오류`, e.message, true);
    addLog('error', `매물 ${uploadListingId} 업로드 오류`, e.message);
  }

  isUploading = false;
}

// ===== UPLOAD BAR (Non-blocking) =====
function showUploadBar(title, sub, pct) {
  const bar = document.getElementById('uploadBar');
  bar.classList.remove('done');
  bar.classList.add('show');
  document.getElementById('uploadBarSpinner').innerHTML = '';
  document.getElementById('uploadBarTitle').textContent = title;
  document.getElementById('uploadBarSub').textContent = sub;
  document.getElementById('uploadBarFill').style.width = pct + '%';
  document.getElementById('uploadBarClose').style.display = 'none';
}

function updateUploadBar(title, sub, pct) {
  document.getElementById('uploadBarTitle').textContent = title;
  document.getElementById('uploadBarSub').textContent = sub;
  document.getElementById('uploadBarFill').style.width = pct + '%';
}

function completeUploadBar(title, sub, isError) {
  const bar = document.getElementById('uploadBar');
  bar.classList.add('done');
  document.getElementById('uploadBarSpinner').textContent = isError ? '❌' : '✅';
  document.getElementById('uploadBarTitle').textContent = title;
  document.getElementById('uploadBarSub').textContent = sub;
  document.getElementById('uploadBarFill').style.width = '100%';
  document.getElementById('uploadBarClose').style.display = '';

  // Auto-hide after 5 seconds
  setTimeout(() => closeUploadBar(), 5000);
}

function closeUploadBar() {
  document.getElementById('uploadBar').classList.remove('show');
  setTimeout(() => document.getElementById('uploadBar').classList.remove('done'), 300);
}

// ===== UPLOAD LOG =====
function addLog(type, title, detail) {
  const container = document.getElementById('pvLog');
  const list = document.getElementById('pvLogList');
  container.classList.add('show');

  const now = new Date();
  const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

  const item = document.createElement('div');
  item.className = `log-item ${type}`;
  item.innerHTML = `
    <div class="log-icon">${type === 'success' ? '✅' : '❌'}</div>
    <div class="log-body">
      <div class="log-title">${escHtml(title)}</div>
      <div class="log-detail ${type === 'error' ? 'error-detail' : ''}">${escHtml(detail)}</div>
      <div class="log-time">${time}</div>
    </div>`;
  list.insertBefore(item, list.firstChild);
  while (list.children.length > 10) list.removeChild(list.lastChild);
}

// ===== UI HELPERS =====
function showLoading(on) {
  isLoading = on;
  const list = document.getElementById('resultsList');
  if (on && list.children.length === 0) {
    list.innerHTML = '<div class="skeleton"></div>'.repeat(3);
    document.getElementById('emptyState').style.display = 'none';
  }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

function showProgress(on, text, sub) {
  const o = document.getElementById('progressOverlay');
  if (on) {
    document.getElementById('progressText').textContent = text || '처리 중...';
    document.getElementById('progressSub').textContent = sub || '';
    document.getElementById('progressDetail').textContent = '';
    o.classList.add('show');
  } else {
    o.classList.remove('show');
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
