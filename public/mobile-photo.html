<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2d5016">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192x192.png">
<title>WISHES 모바일 사진등록</title>
<style>
  :root {
    --primary: #2d5016;
    --primary-light: #4a7c2e;
    --accent: #e8a900;
    --bg: #f5f3eb;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-sub: #666666;
    --border: #e0ddd4;
    --success: #10b981;
    --danger: #ef4444;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--primary);
    color: white;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  .header-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #f0c040);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; opacity: .7; margin-top: 1px; }
  .header-back {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,.15); border: none; color: white;
    padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
  }

  /* Status bar (GPS + Offline) */
  .status-bar {
    background: #1a2e0a;
    padding: 6px 20px;
    font-size: 11px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .status-item {
    display: flex; align-items: center; gap: 5px;
    color: #86efac;
  }
  .status-item.error { color: #fca5a5; }
  .status-item.warning { color: #fde68a; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s infinite;
  }
  .status-item.error .status-dot { background: #ef4444; animation: none; }
  .status-item.warning .status-dot { background: #f59e0b; animation: blink 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  /* Offline queue banner */
  .offline-banner {
    display: none;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: white;
    padding: 10px 20px;
    font-size: 13px; font-weight: 600;
    align-items: center; gap: 8px;
    cursor: pointer;
  }
  .offline-banner.show { display: flex; }
  .offline-banner .queue-count {
    background: white; color: #d97706;
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 700;
  }

  /* Search Section */
  .search-section {
    padding: 16px;
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .search-box { display: flex; gap: 8px; }
  .search-input {
    flex: 1;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 16px;
    outline: none;
    transition: border-color .2s;
    background: var(--bg);
  }
  .search-input:focus { border-color: var(--primary); }
  .search-input::placeholder { color: #aaa; }
  .search-btn {
    padding: 14px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .search-btn:active { background: var(--primary-light); }
  .search-hint { margin-top: 8px; font-size: 12px; color: var(--text-sub); }

  /* Listing Results */
  .results-section { padding: 12px 16px; }
  .results-count {
    font-size: 13px; color: var(--text-sub);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .results-count strong { color: var(--primary); font-size: 15px; }

  .listing-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 2px solid transparent;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .listing-card:active { transform: scale(.98); }
  .listing-card.selected {
    border-color: var(--primary);
    background: #f0f7ec;
    box-shadow: 0 0 0 3px rgba(45,80,22,.12);
  }
  .listing-id {
    display: inline-block;
    background: var(--primary); color: white;
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 6px;
    margin-bottom: 6px;
  }
  .listing-title {
    font-size: 15px; font-weight: 600;
    line-height: 1.4; margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .listing-info {
    font-size: 12px; color: var(--text-sub);
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .listing-info span { background: var(--bg); padding: 2px 8px; border-radius: 6px; }
  .listing-price {
    position: absolute; right: 16px; top: 14px;
    font-size: 14px; font-weight: 700; color: var(--danger);
  }
  .listing-check {
    position: absolute; right: 16px; bottom: 14px;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; background: var(--border); color: white;
    transition: all .2s;
  }
  .listing-card.selected .listing-check { background: var(--success); }
  .listing-images-count {
    display: inline-flex; align-items: center; gap: 3px;
    background: #e0f2fe; color: #0369a1;
    padding: 2px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
  }

  /* Upload Section */
  .upload-section {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--border);
    padding: 16px;
    box-shadow: 0 -4px 20px rgba(0,0,0,.08);
    z-index: 90;
    transition: transform .3s;
  }
  .upload-section.hidden { transform: translateY(100%); }
  .selected-info {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
    padding: 10px 14px;
    background: #f0f7ec;
    border-radius: 10px;
    border: 1px solid #d4e8c8;
  }
  .selected-info-icon {
    width: 36px; height: 36px;
    background: var(--primary); color: white;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .selected-info-text { flex: 1; min-width: 0; }
  .selected-info-text .name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .selected-info-text .id { font-size: 11px; color: var(--text-sub); }
  .upload-actions { display: flex; gap: 10px; }
  .upload-btn {
    flex: 1; padding: 16px;
    border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all .15s;
  }
  .upload-btn:active { transform: scale(.97); }
  .upload-btn.camera { background: var(--accent); color: var(--text); }
  .upload-btn.gallery { background: var(--primary); color: white; }
  .upload-btn:disabled { opacity: .5; pointer-events: none; }

  /* Preview Section */
  .preview-section { padding: 0 16px 160px; }
  .preview-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-top: 12px;
  }
  .preview-item {
    position: relative; aspect-ratio: 1;
    border-radius: 10px; overflow: hidden; background: #eee;
  }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-remove {
    position: absolute; top: 4px; right: 4px;
    width: 24px; height: 24px;
    background: rgba(0,0,0,.6); color: white;
    border: none; border-radius: 50%;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-size {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,.5);
    color: #86efac; font-size: 9px; font-weight: 700;
    padding: 2px 5px; border-radius: 4px;
  }
  .preview-label {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 16px;
  }
  .preview-label-text { font-size: 14px; font-weight: 600; }
  .submit-btn {
    padding: 12px 24px;
    background: var(--success); color: white;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .submit-btn:disabled { background: #ccc; pointer-events: none; }
  .submit-btn:active { transform: scale(.97); }

  /* Existing Images */
  .existing-images { margin-top: 12px; }
  .existing-label { font-size: 13px; color: var(--text-sub); margin-bottom: 8px; }
  .existing-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .existing-item {
    aspect-ratio: 1; border-radius: 10px;
    overflow: hidden; background: #eee;
    border: 2px solid var(--border);
  }
  .existing-item img { width: 100%; height: 100%; object-fit: cover; }

  /* Toast */
  .toast {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1a1a1a; color: white;
    padding: 14px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    z-index: 200; opacity: 0;
    transition: all .3s; pointer-events: none;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* Progress */
  .progress-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .progress-overlay.show { opacity: 1; pointer-events: all; }
  .progress-box {
    background: white; padding: 32px;
    border-radius: 20px; text-align: center;
    min-width: 280px;
  }
  .progress-spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-text { font-size: 15px; font-weight: 600; }
  .progress-sub { font-size: 12px; color: var(--text-sub); margin-top: 6px; }
  .progress-detail { font-size: 11px; color: var(--primary); margin-top: 8px; font-weight: 600; }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius);
    height: 80px; margin-bottom: 10px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-sub); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty-state .desc { font-size: 13px; line-height: 1.6; }

  /* PWA install banner */
  .pwa-install {
    display: none;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 12px 20px;
    align-items: center; gap: 10px;
    cursor: pointer;
  }
  .pwa-install.show { display: flex; }
  .pwa-install-text { flex: 1; font-size: 13px; font-weight: 600; }
  .pwa-install-btn {
    background: white; color: var(--primary);
    border: none; padding: 8px 16px; border-radius: 8px;
    font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .pwa-install-close {
    background: none; border: none; color: rgba(255,255,255,.7);
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }

  input[type="file"] { display: none; }
  .content-area { padding-bottom: 160px; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">📷</div>
  <div>
    <div class="header-title">WISHES 모바일 사진등록</div>
    <div class="header-sub">매물을 검색하고 사진을 바로 등록하세요</div>
  </div>
  <button class="header-back" onclick="window.location.href='/admin?tab=search'">← 관리자</button>
</div>

<!-- Status Bar (GPS + Network) -->
<div class="status-bar" id="statusBar">
  <div class="status-item" id="gpsStatus">
    <div class="status-dot"></div>
    <span>GPS 확인 중...</span>
  </div>
  <div class="status-item" id="netStatus">
    <div class="status-dot"></div>
    <span>온라인</span>
  </div>
</div>

<!-- Offline Queue Banner -->
<div class="offline-banner" id="offlineBanner" onclick="retryOfflineQueue()">
  <span>📦 대기 중인 업로드</span>
  <span class="queue-count" id="queueCount">0건</span>
  <span style="flex:1; text-align:right; font-size:12px;">탭하여 재시도 →</span>
</div>

<!-- PWA Install Banner -->
<div class="pwa-install" id="pwaInstall">
  <span class="pwa-install-text">📲 홈 화면에 추가하면 더 빠르게 접근할 수 있어요</span>
  <button class="pwa-install-btn" onclick="installPWA()">설치</button>
  <button class="pwa-install-close" onclick="dismissPWA()">✕</button>
</div>

<!-- Search -->
<div class="search-section">
  <div class="search-box">
    <input type="text" class="search-input" id="searchInput"
           placeholder="건물명, 주소, 매물ID 검색..."
           enterkeyhint="search" autocomplete="off">
    <button class="search-btn" id="searchBtn" onclick="searchListings()">검색</button>
  </div>
  <div class="search-hint" id="searchHint">💡 건물명, 주소, W-번호로 검색할 수 있습니다</div>
</div>

<!-- Content -->
<div class="content-area">
  <div class="results-section" id="resultsSection">
    <div class="empty-state" id="emptyState">
      <div class="icon">🏠</div>
      <div class="title">매물을 검색해주세요</div>
      <div class="desc">건물명, 주소 또는 매물번호(W-XXXXX)를<br>검색하면 사진을 등록할 수 있습니다</div>
    </div>
    <div id="resultsList"></div>
  </div>

  <div class="preview-section" id="previewSection" style="display:none;">
    <div class="existing-images" id="existingImages" style="display:none;">
      <div class="existing-label">📌 기존 등록된 사진</div>
      <div class="existing-grid" id="existingGrid"></div>
    </div>
    <div class="preview-label">
      <span class="preview-label-text" id="previewLabel">📸 새로 추가할 사진 (0장)</span>
      <button class="submit-btn" id="submitBtn" onclick="uploadImages()" disabled>
        ⬆️ 업로드
      </button>
    </div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>
</div>

<!-- Upload Bar -->
<div class="upload-section hidden" id="uploadBar">
  <div class="selected-info" id="selectedInfo">
    <div class="selected-info-icon">🏢</div>
    <div class="selected-info-text">
      <div class="name" id="selectedName">-</div>
      <div class="id" id="selectedId">-</div>
    </div>
  </div>
  <div class="upload-actions">
    <button class="upload-btn camera" onclick="openCamera()">📷 카메라 촬영</button>
    <button class="upload-btn gallery" onclick="openGallery()">🖼️ 갤러리 선택</button>
  </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" multiple>
<input type="file" id="galleryInput" accept="image/*" multiple>
<div class="toast" id="toast"></div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="progress-spinner"></div>
    <div class="progress-text" id="progressText">사진 업로드 중...</div>
    <div class="progress-sub" id="progressSub">잠시만 기다려주세요</div>
    <div class="progress-detail" id="progressDetail"></div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const AUTH_TOKEN = 'wishes2026';
let allListings = [];
let selectedListing = null;
let pendingFiles = [];  // { file, originalSize, compressedSize, gps }
let isLoading = false;

// ===== GPS =====
let currentGPS = null;
let gpsWatchId = null;

function initGPS() {
  const item = document.getElementById('gpsStatus');
  const span = item.querySelector('span');

  if (!navigator.geolocation) {
    item.classList.add('error');
    span.textContent = 'GPS 미지원';
    return;
  }

  gpsWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      currentGPS = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: Math.round(pos.coords.accuracy),
        timestamp: new Date().toISOString()
      };
      item.classList.remove('error');
      span.textContent = `📍 ${currentGPS.lat.toFixed(5)}, ${currentGPS.lng.toFixed(5)} (±${currentGPS.accuracy}m)`;
    },
    (err) => {
      item.classList.add('error');
      if (err.code === 1) span.textContent = '위치 권한 거부됨';
      else if (err.code === 2) span.textContent = 'GPS 신호 없음';
      else span.textContent = 'GPS 실패';
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 }
  );
}

// ===== NETWORK STATUS =====
let isOnline = navigator.onLine;

function initNetworkStatus() {
  updateNetUI();
  window.addEventListener('online', () => {
    isOnline = true;
    updateNetUI();
    showToast('🌐 인터넷 연결됨 — 대기 업로드 시작', 'success');
    processOfflineQueue();
  });
  window.addEventListener('offline', () => {
    isOnline = false;
    updateNetUI();
    showToast('📴 오프라인 모드 — 사진이 임시 저장됩니다', 'error');
  });
}

function updateNetUI() {
  const item = document.getElementById('netStatus');
  const span = item.querySelector('span');
  if (isOnline) {
    item.classList.remove('error', 'warning');
    span.textContent = '온라인';
  } else {
    item.classList.add('warning');
    item.classList.remove('error');
    span.textContent = '오프라인';
  }
}

// ===== IndexedDB OFFLINE QUEUE =====
const DB_NAME = 'wishes_photo_queue';
const DB_VERSION = 1;
const STORE_NAME = 'uploads';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToOfflineQueue(listingId, listingTitle, files) {
  const db = await openDB();
  const tx = db.transaction(STORE_NAME, 'readwrite');
  const store = tx.objectStore(STORE_NAME);

  for (const pf of files) {
    const arrayBuf = await pf.file.arrayBuffer();
    store.add({
      listingId,
      listingTitle,
      fileName: pf.file.name,
      fileType: pf.file.type,
      fileData: arrayBuf,
      originalSize: pf.originalSize,
      compressedSize: pf.compressedSize,
      gps: pf.gps,
      savedAt: new Date().toISOString()
    });
  }

  await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  db.close();
  await updateOfflineBanner();
}

async function getOfflineQueue() {
  const db = await openDB();
  const tx = db.transaction(STORE_NAME, 'readonly');
  const store = tx.objectStore(STORE_NAME);
  const items = await new Promise((res) => {
    const req = store.getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => res([]);
  });
  db.close();
  return items;
}

async function removeFromQueue(id) {
  const db = await openDB();
  const tx = db.transaction(STORE_NAME, 'readwrite');
  tx.objectStore(STORE_NAME).delete(id);
  await new Promise((res) => { tx.oncomplete = res; });
  db.close();
}

async function updateOfflineBanner() {
  const items = await getOfflineQueue();
  const banner = document.getElementById('offlineBanner');
  const count = document.getElementById('queueCount');
  if (items.length > 0) {
    banner.classList.add('show');
    count.textContent = `${items.length}건`;
  } else {
    banner.classList.remove('show');
  }
}

async function processOfflineQueue() {
  if (!isOnline) return;

  const items = await getOfflineQueue();
  if (items.length === 0) return;

  // Group by listingId
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.listingId]) grouped[item.listingId] = [];
    grouped[item.listingId].push(item);
  });

  let totalUploaded = 0;
  let totalFailed = 0;

  for (const [listingId, group] of Object.entries(grouped)) {
    showProgress(true, '대기 사진 업로드 중...', `매물 W-${listingId} (${group.length}장)`);

    try {
      const formData = new FormData();
      const metadata = [];

      for (const item of group) {
        const blob = new Blob([item.fileData], { type: item.fileType });
        const file = new File([blob], item.fileName, { type: item.fileType });
        formData.append('images', file);
        metadata.push({
          gps: item.gps,
          originalSize: item.originalSize,
          compressedSize: item.compressedSize,
        });
      }
      formData.append('metadata', JSON.stringify(metadata));

      const res = await fetch(`${API_BASE}/api/listings/${listingId}/images`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
        body: formData
      });

      const data = await res.json();
      if (data.success) {
        for (const item of group) {
          await removeFromQueue(item.id);
        }
        totalUploaded += group.length;
      } else {
        totalFailed += group.length;
      }
    } catch (e) {
      console.error('Offline upload error:', e);
      totalFailed += group.length;
    }
  }

  showProgress(false);
  await updateOfflineBanner();

  if (totalUploaded > 0) {
    showToast(`✅ 대기 사진 ${totalUploaded}장 업로드 완료!`, 'success');
  }
  if (totalFailed > 0) {
    showToast(`⚠️ ${totalFailed}장 업로드 실패 — 나중에 재시도됩니다`, 'error');
  }
}

function retryOfflineQueue() {
  if (!isOnline) {
    showToast('인터넷 연결 후 다시 시도해주세요', 'error');
    return;
  }
  processOfflineQueue();
}

// ===== IMAGE COMPRESSION =====
const MAX_WIDTH = 1920;
const MAX_HEIGHT = 1920;
const QUALITY = 0.82;
const MAX_FILE_SIZE = 2 * 1024 * 1024; // 2MB target

function compressImage(file) {
  return new Promise((resolve) => {
    if (file.size <= MAX_FILE_SIZE && !file.type.includes('heic')) {
      resolve({ compressed: file, originalSize: file.size, compressedSize: file.size });
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > MAX_WIDTH || height > MAX_HEIGHT) {
          const ratio = Math.min(MAX_WIDTH / width, MAX_HEIGHT / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob((blob) => {
          if (blob) {
            const compressed = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), {
              type: 'image/jpeg',
              lastModified: file.lastModified
            });
            resolve({ compressed, originalSize: file.size, compressedSize: compressed.size });
          } else {
            resolve({ compressed: file, originalSize: file.size, compressedSize: file.size });
          }
        }, 'image/jpeg', QUALITY);
      };
      img.onerror = () => resolve({ compressed: file, originalSize: file.size, compressedSize: file.size });
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + 'KB';
  return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
}

// ===== PWA INSTALL =====
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (!localStorage.getItem('pwa_dismissed')) {
    document.getElementById('pwaInstall').classList.add('show');
  }
});

function installPWA() {
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then((result) => {
      if (result.outcome === 'accepted') {
        showToast('✅ 홈 화면에 추가되었습니다!', 'success');
      }
      deferredInstallPrompt = null;
      document.getElementById('pwaInstall').classList.remove('show');
    });
  }
}

function dismissPWA() {
  document.getElementById('pwaInstall').classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
}

if ('serviceWorker' in navigator) {

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchListings();
  });
  document.getElementById('cameraInput').addEventListener('change', handleFiles);
  document.getElementById('galleryInput').addEventListener('change', handleFiles);

  initGPS();
  initNetworkStatus();
  updateOfflineBanner();
  loadRecentListings();

  // Auto-process offline queue on load if online
  setTimeout(() => { if (isOnline) processOfflineQueue(); }, 3000);
});

// ===== LISTINGS =====
async function loadRecentListings() {
  showLoading(true);
  try {
    const res = await fetch(`${API_BASE}/api/listings?limit=20&offset=0`, {
      headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` }
    });
    const data = await res.json();
    if (data.success !== false && data.data) {
      allListings = data.data;
      renderListings(data.data, '최근 등록된 매물');
    }
  } catch(e) { console.error('Load error:', e); }
  showLoading(false);
}

async function searchListings() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) { showToast('검색어를 입력해주세요', 'error'); return; }

  showLoading(true);
  document.getElementById('searchBtn').textContent = '검색중...';

  try {
    if (allListings.length === 0) {
      let offset = 0, batch;
      do {
        const res = await fetch(`${API_BASE}/api/listings?limit=1000&offset=${offset}`, {
          headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` }
        });
        const data = await res.json();
        batch = data.data || [];
        allListings = allListings.concat(batch);
        offset += 1000;
      } while (batch.length === 1000);
    }

    const q = query.toLowerCase();
    const isIdSearch = q.match(/w-?(\d+)/i);
    let results;
    if (isIdSearch) {
      const searchId = parseInt(isIdSearch[1]);
      results = allListings.filter(l => l.id === searchId);
    } else {
      results = allListings.filter(l => {
        const searchFields = [l.title, l.address, l.address_detail, l.dong, l.building_info, String(l.id)]
          .filter(Boolean).join(' ').toLowerCase();
        return searchFields.includes(q);
      });
    }

    renderListings(results.slice(0, 50), `"${query}" 검색 결과`);
    document.getElementById('searchHint').innerHTML =
      `🔍 <strong>${results.length}건</strong> 검색됨 ${results.length > 50 ? '(상위 50건 표시)' : ''}`;
  } catch(e) {
    showToast('검색 중 오류가 발생했습니다', 'error');
    console.error('Search error:', e);
  }

  document.getElementById('searchBtn').textContent = '검색';
  showLoading(false);
}

function renderListings(listings, label) {
  const container = document.getElementById('resultsList');
  const empty = document.getElementById('emptyState');

  if (listings.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    empty.querySelector('.title').textContent = '검색 결과가 없습니다';
    empty.querySelector('.desc').textContent = '다른 검색어로 시도해보세요';
    return;
  }
  empty.style.display = 'none';

  container.innerHTML = `<div class="results-count">📋 ${label} <strong>${listings.length}건</strong></div>` +
    listings.map(l => {
      const imageCount = (l.listing_images || []).length;
      const price = formatPrice(l);
      const isSelected = selectedListing && selectedListing.id === l.id;
      return `
        <div class="listing-card ${isSelected ? 'selected' : ''}" onclick="selectListing(${l.id})" data-id="${l.id}">
          <span class="listing-id">W-${l.id}</span>
          ${imageCount > 0 ? `<span class="listing-images-count">📷 ${imageCount}장</span>` : ''}
          <div class="listing-title">${escHtml(l.title || '제목 없음')}</div>
          <div class="listing-info">
            <span>${escHtml(l.address || '')}</span>
            ${l.type ? `<span>${l.type}</span>` : ''}
            ${l.deal ? `<span>${l.deal}</span>` : ''}
            ${l.area_m2 ? `<span>${l.area_m2}㎡</span>` : ''}
          </div>
          <div class="listing-price">${price}</div>
          <div class="listing-check">${isSelected ? '✓' : ''}</div>
        </div>`;
    }).join('');
}

function formatPrice(l) {
  if (l.deposit && l.monthly) return `${formatNum(l.deposit)}/${formatNum(l.monthly)}`;
  if (l.price) return formatNum(l.price);
  if (l.deposit) return formatNum(l.deposit);
  return '';
}
function formatNum(n) {
  if (!n) return '0';
  n = Number(n);
  if (n >= 10000) return (n/10000).toFixed(n%10000?1:0) + '억';
  return n.toLocaleString() + '만';
}

// ===== SELECT LISTING =====
async function selectListing(id) {
  const listing = allListings.find(l => l.id === id);
  if (!listing) return;

  selectedListing = listing;
  pendingFiles = [];

  document.querySelectorAll('.listing-card').forEach(card => {
    card.classList.toggle('selected', parseInt(card.dataset.id) === id);
    card.querySelector('.listing-check').textContent = parseInt(card.dataset.id) === id ? '✓' : '';
  });

  document.getElementById('uploadBar').classList.remove('hidden');
  document.getElementById('selectedName').textContent = listing.title || '제목 없음';
  document.getElementById('selectedId').textContent = `W-${listing.id} | ${listing.address || ''}`;

  document.getElementById('previewSection').style.display = 'block';
  updatePreview();
  await loadExistingImages(id);

  const card = document.querySelector(`.listing-card[data-id="${id}"]`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function loadExistingImages(listingId) {
  try {
    const res = await fetch(`${API_BASE}/api/listings/${listingId}/images`, {
      headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` }
    });
    const data = await res.json();
    const images = data.data || [];
    const container = document.getElementById('existingImages');
    const grid = document.getElementById('existingGrid');

    if (images.length > 0) {
      container.style.display = 'block';
      grid.innerHTML = images.map(img => `
        <div class="existing-item">
          <img src="${img.url || img.image_url}" alt="기존 사진" loading="lazy"
               onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:12px\\'>로딩실패</div>'">
        </div>`).join('');
    } else {
      container.style.display = 'none';
      grid.innerHTML = '';
    }
  } catch(e) { console.error('Load images error:', e); }
}

// ===== FILE HANDLING =====
function openCamera() {
  if (!selectedListing) return;
  document.getElementById('cameraInput').click();
}
function openGallery() {
  if (!selectedListing) return;
  document.getElementById('galleryInput').click();
}

async function handleFiles(e) {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;

  showProgress(true, '사진 처리 중...', `${files.length}장 압축 중`);

  let added = 0;
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (pendingFiles.length >= 20) {
      showToast('최대 20장까지 선택할 수 있습니다', 'error');
      break;
    }

    const { compressed, originalSize, compressedSize } = await compressImage(file);

    pendingFiles.push({
      file: compressed,
      originalSize,
      compressedSize,
      gps: currentGPS ? { ...currentGPS } : null
    });
    added++;

    document.getElementById('progressDetail').textContent =
      `${added}/${files.length} 완료`;
  }

  showProgress(false);
  updatePreview();
  e.target.value = '';

  const totalOriginal = pendingFiles.reduce((s, f) => s + f.originalSize, 0);
  const totalCompressed = pendingFiles.reduce((s, f) => s + f.compressedSize, 0);
  const saved = totalOriginal - totalCompressed;

  if (saved > 100000) {
    showToast(`${added}장 추가 (${formatBytes(saved)} 절약됨)`, 'success');
  } else {
    showToast(`${added}장 추가됨 (총 ${pendingFiles.length}장)`, 'success');
  }
}

function updatePreview() {
  const grid = document.getElementById('previewGrid');
  const label = document.getElementById('previewLabel');
  const submitBtn = document.getElementById('submitBtn');

  label.textContent = `📸 새로 추가할 사진 (${pendingFiles.length}장)`;
  submitBtn.disabled = pendingFiles.length === 0;

  grid.innerHTML = pendingFiles.map((pf, i) => `
    <div class="preview-item">
      <img src="${URL.createObjectURL(pf.file)}" alt="미리보기">
      <button class="preview-remove" onclick="removeFile(${i})">✕</button>
      <span class="preview-size">${formatBytes(pf.compressedSize)}</span>
    </div>`).join('');
}

function removeFile(index) {
  pendingFiles.splice(index, 1);
  updatePreview();
}

// ===== UPLOAD =====
async function uploadImages() {
  if (!selectedListing || pendingFiles.length === 0) return;

  // OFFLINE: save to IndexedDB
  if (!isOnline) {
    showProgress(true, '오프라인 임시 저장 중...', `${pendingFiles.length}장`);
    try {
      await saveToOfflineQueue(selectedListing.id, selectedListing.title, pendingFiles);
      showToast(`📦 ${pendingFiles.length}장 임시 저장 완료 — Wi-Fi 연결 시 자동 업로드`, 'success');
      pendingFiles = [];
      updatePreview();
    } catch(e) {
      showToast('임시 저장 실패', 'error');
      console.error('Offline save error:', e);
    }
    showProgress(false);
    return;
  }

  // ONLINE: direct upload
  const totalSize = pendingFiles.reduce((s, f) => s + f.compressedSize, 0);
  showProgress(true, '사진 업로드 중...', `${pendingFiles.length}장 (${formatBytes(totalSize)})`);

  try {
    const formData = new FormData();
    pendingFiles.forEach((pf) => {
      formData.append('images', pf.file);
    });

    const metadata = pendingFiles.map(pf => ({
      gps: pf.gps,
      originalSize: pf.originalSize,
      compressedSize: pf.compressedSize,
    }));
    formData.append('metadata', JSON.stringify(metadata));

    const res = await fetch(`${API_BASE}/api/listings/${selectedListing.id}/images`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
      body: formData
    });

    const data = await res.json();

    if (data.success) {
      const origTotal = pendingFiles.reduce((s, f) => s + f.originalSize, 0);
      const compTotal = pendingFiles.reduce((s, f) => s + f.compressedSize, 0);
      const savedPct = origTotal > 0 ? Math.round((1 - compTotal / origTotal) * 100) : 0;

      showToast(`✅ ${pendingFiles.length}장 업로드 완료! ${savedPct > 5 ? '(' + savedPct + '% 절약)' : ''}`, 'success');
      pendingFiles = [];
      updatePreview();
      await loadExistingImages(selectedListing.id);

      const card = document.querySelector(`.listing-card[data-id="${selectedListing.id}"]`);
      if (card) {
        const existing = card.querySelector('.listing-images-count');
        const newCount = (data.data || []).length || (document.getElementById('existingGrid').children.length);
        if (existing) {
          existing.textContent = `📷 ${newCount}장`;
        } else {
          const idSpan = card.querySelector('.listing-id');
          idSpan.insertAdjacentHTML('afterend', ` <span class="listing-images-count">📷 ${newCount}장</span>`);
        }
      }
    } else {
      // Upload failed — save offline
      await saveToOfflineQueue(selectedListing.id, selectedListing.title, pendingFiles);
      showToast(`❌ 업로드 실패 — 임시 저장됨. 나중에 재시도됩니다`, 'error');
      pendingFiles = [];
      updatePreview();
    }
  } catch(e) {
    // Network error — save offline
    console.error('Upload error:', e);
    await saveToOfflineQueue(selectedListing.id, selectedListing.title, pendingFiles);
    showToast(`📦 네트워크 오류 — ${pendingFiles.length}장 임시 저장됨`, 'error');
    pendingFiles = [];
    updatePreview();
  }

  showProgress(false);
}

// ===== UI HELPERS =====
function showLoading(on) {
  isLoading = on;
  const list = document.getElementById('resultsList');
  if (on && list.children.length === 0) {
    list.innerHTML = '<div class="skeleton"></div>'.repeat(3);
    document.getElementById('emptyState').style.display = 'none';
  }
}

function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => { toast.className = 'toast'; }, 2500);
}

function showProgress(on, text, sub) {
  const overlay = document.getElementById('progressOverlay');
  if (on) {
    document.getElementById('progressText').textContent = text || '처리 중...';
    document.getElementById('progressSub').textContent = sub || '';
    document.getElementById('progressDetail').textContent = '';
    overlay.classList.add('show');
  } else {
    overlay.classList.remove('show');
  }
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
