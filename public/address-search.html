<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WISHES 주소 검색</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff;overflow:hidden}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;color:#666}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top:3px solid #15803d;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:8px;color:#dc2626;text-align:center;padding:20px}
</style>
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div><span>주소 검색 로딩 중...</span></div>
<script>
(function(){
  var s = document.createElement('script');
  s.src = 'https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js';
  s.onload = function(){
    document.getElementById('loading').style.display = 'none';
    new daum.Postcode({
      oncomplete: function(data){
        window.parent.postMessage({
          type: 'WISHES_ADDRESS_SELECTED',
          data: data
        }, '*');
      },
      width: '100%',
      height: '100%'
    }).open({
      popupKey: 'wishesAddress',
      autoClose: false
    });
  };
  s.onerror = function(){
    document.getElementById('loading').innerHTML =
      '<div class="error"><b>스크립트 로드 실패</b><p>네트워크를 확인해주세요.</p></div>';
  };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
