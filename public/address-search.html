<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WISHES 주소 검색</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8faf8;overflow:hidden}
.header{background:#15803d;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 48px);gap:12px;color:#666}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top:3px solid #15803d;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#wrap{height:calc(100vh - 48px);overflow:hidden}
.error{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 48px);gap:8px;color:#dc2626;text-align:center;padding:20px}
</style>
</head>
<body>
<div class="header">\ud83d\udccd WISHES 주소 검색</div>
<div id="wrap">
  <div class="loading"><div class="spinner"></div><span>주소 검색 로딩 중...</span></div>
</div>
<script>
(function(){
  var s = document.createElement('script');
  s.src = 'https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js';
  s.onload = function(){
    document.getElementById('wrap').innerHTML = '';
    new daum.Postcode({
      oncomplete: function(data){
        window.parent.postMessage({
          type: 'WISHES_ADDRESS_SELECTED',
          data: data
        }, '*');
      },
      width: '100%',
      height: '100%'
    }).embed(document.getElementById('wrap'));
  };
  s.onerror = function(){
    document.getElementById('wrap').innerHTML =
      '<div class="error"><b>스크립트 로드 실패</b><p>네트워크를 확인해주세요.</p></div>';
  };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
