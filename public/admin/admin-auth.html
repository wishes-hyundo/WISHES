<!DOCTYPE html>
<html lang="ko">
<head>
        <script src="auth-bridge.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>WISHES 관리자 로그인 | 한국 부동산 관리 시스템</title>
    <meta name="description" content="WISHES 부동산 관리 시스템 - 전문 공인중개사 관리 플랫폼">
    <meta name="theme-color" content="#2D5A27">

    <style>
        :root {
            --primary: #2D5A27;
            --primary-light: #4CAF50;
            --accent: #ed8936;
            --bg: #0a0f0a;
            --card: #111a11;
            --border: #1e2e1e;
            --text: #8f0e8;
            --text-light: #a8c0a0;
            --text-lighter: #6b7d6a;
            --success: #4CAF50;
            --error: #f44336;
            --warning: #ff9800;
            --info: #2196F3;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(90deg, rgba(77, 175, 80, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(77, 175, 80, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveGrid 20s linear infinite;
        }

        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(77, 175, 80, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 15s ease-in-out infinite;
        }

        .bg-glow:nth-child(2) {
            top: -50px;
            left: -100px;
            animation-delay: -5s;
            width: 400px;
            height: 400px;
        }

        .bg-glow:nth-child(3) {
            bottom: -100px;
            right: -50px;
            animation-delay: -10s;
            background: radial-gradient(circle, rgba(237, 137, 54, 0.1) 0%, transparent 70%);
        }

        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* Main Container */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        .brand {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 12px;
            color: var(--text-lighter);
            letter-spacing: 1px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Card */
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(17, 26, 17, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeInScale 0.6s ease-out 0.1s both;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Tabs */
        .tab-container {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 16px 20px;
            background: transparent;
            border: none;
            color: var(--text-lighter);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .tab-btn:hover {
            color: var(--text);
            background: rgba(77, 175, 80, 0.05);
        }

        .tab-btn.active {
            color: var(--primary-light);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                width: 0;
                left: 50%;
            }
            to {
                width: 100%;
                left: 0;
            }
        }

        .tab-content {
            padding: 30px 25px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 18px;
            animation: slideInLeft 0.4s ease-out both;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.15s; }
        .form-group:nth-child(3) { animation-delay: 0.2s; }
        .form-group:nth-child(4) { animation-delay: 0.25s; }
        .form-group:nth-child(5) { animation-delay: 0.3s; }
        .form-group:nth-child(6) { animation-delay: 0.35s; }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-light);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 11px 12px;
            background: rgba(45, 90, 39, 0.1);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="password"]::placeholder,
        input[type="tel"]::placeholder,
        textarea::placeholder {
            color: var(--text-lighter);
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary-light);
            background: rgba(76, 175, 80, 0.1);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        input[type="text"].valid,
        input[type="email"].valid,
        input[type="password"].valid,
        input[type="tel"].valid {
            border-color: var(--success);
            background: rgba(76, 175, 80, 0.05);
        }

        input[type="text"].invalid,
        input[type="email"].invalid,
        input[type="password"].invalid,
        input[type="tel"].invalid {
            border-color: var(--error);
            background: rgba(244, 67, 54, 0.05);
        }

        /* Validation Indicator */
        .validation-indicator {
            position: absolute;
            right: 12px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .validation-indicator.show {
            opacity: 1;
        }

        .validation-indicator.valid {
            color: var(--success);
        }

        .validation-indicator.invalid {
            color: var(--error);
        }

        /* Password Strength Meter */
        .strength-meter {
            margin-top: 6px;
            height: 4px;
            background: rgba(45, 90, 39, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 2px;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 4px;
            color: var(--text-lighter);
            transition: color 0.3s ease;
        }

        .strength-text.weak { color: var(--error); }
        .strength-text.fair { color: var(--warning); }
        .strength-text.good { color: var(--primary-light); }
        .strength-text.strong { color: var(--info); }

        /* Password Requirements */
        .requirements-list {
            background: rgba(45, 90, 39, 0.08);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-top: 10px;
            font-size: 12px;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin: 6px 0;
            color: var(--text-lighter);
            transition: color 0.2s;
        }

        .requirement.met {
            color: var(--success);
        }

        .requirement-icon {
            margin-right: 6px;
            width: 14px;
            text-align: center;
        }

        /* Phone Auto-Format */
        .phone-input {
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        /* Validation Message */
        .validation-message {
            font-size: 12px;
            margin-top: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
            min-height: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .validation-message.show {
            opacity: 1;
        }

        .validation-message.success {
            color: var(--success);
        }

        .validation-message.error {
            color: var(--error);
        }

        .validation-message.info {
            color: var(--info);
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-light);
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            user-select: none;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--primary-light), #45a049);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            text-transform: none;
        }

        .btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #45a049, var(--primary-light));
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            transform: translateY(-2px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-loading {
            position: relative;
            color: transparent;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin: -8px 0 0 -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Secondary Button */
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: var(--primary-light);
            color: var(--primary-light);
            background: rgba(76, 175, 80, 0.05);
        }

        /* Links */
        .link {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid transparent;
            font-size: 13px;
        }

        .link:hover {
            color: #f5a962;
            border-bottom-color: #f5a962;
        }

        .forgot-password {
            text-align: center;
            margin-top: 12px;
        }

        /* Forgot Password Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 15, 10, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: rgba(17, 26, 17, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-lighter);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--text);
            background: rgba(76, 175, 80, 0.1);
            border-radius: 4px;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(17, 26, 17, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            min-width: 300px;
            opacity: 1;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(400px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.removing {
            animation: slideOutRight 0.3s ease-out forwards;
        }

        @keyframes slideOutRight {
            to {
                opacity: 0;
                transform: translateX(400px);
            }
        }

        .toast-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-top: 2px;
        }

        .toast-content {
            flex: 1;
            font-size: 13px;
        }

        .toast-title {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .toast-message {
            color: var(--text-lighter);
            font-size: 12px;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.success .toast-icon {
            color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
        }

        .toast.error .toast-icon {
            color: var(--error);
        }

        .toast.warning {
            border-color: var(--warning);
        }

        .toast.warning .toast-icon {
            color: var(--warning);
        }

        .toast.info {
            border-color: var(--info);
        }

        .toast.info .toast-icon {
            color: var(--info);
        }

        /* Rate Limiting */
        .rate-limit-warning {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #ff8a80;
            display: none;
        }

        .rate-limit-warning.show {
            display: block;
            animation: slideInLeft 0.3s ease-out;
        }

        /* Pending Approval Screen */
        .pending-screen {
            display: none;
            padding: 40px 30px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .pending-screen.active {
            display: block;
        }

        .pending-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pending-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
        }

        .pending-message {
            color: var(--text-lighter);
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(76, 175, 80, 0.1) 0%, rgba(76, 175, 80, 0.05) 50%, rgba(76, 175, 80, 0.1) 100%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                max-width: 100%;
                border-radius: 16px;
            }

            .tab-btn {
                padding: 14px 16px;
                font-size: 13px;
            }

            .tab-content {
                padding: 24px 20px;
            }

            .header {
                margin-bottom: 30px;
            }

            .logo {
                font-size: 40px;
            }

            .brand {
                font-size: 20px;
            }

            input[type="text"],
            input[type="email"],
            input[type="password"],
            input[type="tel"],
            select,
            textarea {
                padding: 10px 11px;
                font-size: 16px; /* Prevent zoom on iOS */
            }

            .btn {
                padding: 11px 14px;
                font-size: 13px;
                min-height: 48px;
            }

            .toast-container {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }

            .toast {
                min-width: auto;
            }

            .modal-content {
                padding: 24px;
            }
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: var(--text-lighter);
            opacity: 0.5;
            z-index: 1;
            max-width: 200px;
            text-align: right;
        }

        .footer-text {
            font-size: 8px;
            line-height: 1.2;
            word-break: break-all;
        }

        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .focus-visible {
            outline: 2px solid var(--primary-light);
            outline-offset: 2px;
        }

        /* Dark mode (system preference) */
        @media (prefers-color-scheme: dark) {
            body {
                color-scheme: dark;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-container">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        <div class="bg-glow"></div>
        <div class="bg-glow"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🏠</div>
            <div class="brand">WISHES</div>
            <div class="tagline">전문 부동산 관리 시스템</div>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Tab Navigation -->
            <div class="tab-container">
                <button class="tab-btn active" data-tab="login" aria-label="로그인 탭">로그인</button>
                <button class="tab-btn" data-tab="register" aria-label="가입 탭">가입</button>
            </div>

            <!-- Login Tab -->
            <div class="tab-content active" id="login-tab">
                <div class="rate-limit-warning" id="rateLimitWarning">
                    <div style="font-weight: 500; margin-bottom: 6px;">로그인 시도가 초과되었습니다</div>
                    <div id="lockoutCountdown"></div>
                </div>

                <form id="loginForm" aria-label="로그인 폼">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="loginEmail">이메일</label>
                        <div class="input-wrapper">
                            <input
                                type="email"
                                id="loginEmail"
                                name="email"
                                placeholder="your@email.com"
                                required
                                autocomplete="email"
                                aria-required="true"
                            >
                            <span class="validation-indicator" aria-label="이메일 유효성"></span>
                        </div>
                        <div class="validation-message" role="alert"></div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="loginPassword">비밀번호</label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="loginPassword"
                                name="password"

    <!-- Screen Reader Only Content -->
    <div class="sr-only" role="status" aria-live="polite" aria-atomic="true" id="srLive"></div>

    <script>
        // ========================================
        // Configuration & Constants
        // ========================================
        const CONFIG = {
            API_BASE: '/api/auth',
            SUPERADMIN_EMAILS: ['wishes@wishes.co.kr'],
            SESSION_STORAGE_KEYS: {
                TOKEN: 'ws_token',
                USER: 'ws_user',
                LOGIN_TIME: 'ws_login_time'
            },
            LOCAL_STORAGE_KEYS: {
                ADMIN_PASSWORD: 'admin_password'
            },
            SESSION_DURATION: 24 * 60 * 60 * 1000, // 30 minutes
            SESSION_REFRESH_INTERVAL: 25 * 60 * 1000, // 25 minutes
            SESSION_WARNING_TIME: 5 * 60 * 1000, // 5 minutes before expiry
            RATE_LIMIT: {
                ATTEMPTS: [
                    { count: 3, lockout: 30 * 1000 },      // 3 attempts → 30s
                    { count: 5, lockout: 5 * 60 * 1000 },  // 5 attempts → 5min
                    { count: 10, lockout: 30 * 60 * 1000 } // 10 attempts → 30min
                ]
            },
            VALIDATION_DEBOUNCE: 300,
            TOAST_DURATION: 5000,
            PASSWORD_REQUIREMENTS: {
                minLength: 8,
                hasUppercase: /[A-Z]/,
                hasLowercase: /[a-z]/,
                hasNumber: /[0-9]/,
                hasSpecial: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/
            }
        };

        // ========================================
        // State Management
        // ========================================
        const state = {
            rateLimitAttempts: parseInt(localStorage.getItem('ws_rate_limit_attempts') || '0'),
            rateLimitLockout: parseInt(localStorage.getItem('ws_rate_limit_lockout') || '0'),
            sessionToken: sessionStorage.getItem(CONFIG.SESSION_STORAGE_KEYS.TOKEN),
            sessionUser: sessionStorage.getItem(CONFIG.SESSION_STORAGE_KEYS.USER),
            sessionLoginTime: parseInt(sessionStorage.getItem(CONFIG.SESSION_STORAGE_KEYS.LOGIN_TIME) || '0'),
            deviceFingerprint: null,
            sessionWarningShown: false,
            sessionRefreshTimer: null,
            sessionWarningTimer: null,
            sessionExpiryTimer: null,
            validationTimers: {}
        };

        // ========================================
        // Utility Functions
        // ========================================

        /**
         * Generate device fingerprint using canvas and navigator info
         */
        function generateDeviceFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillText('WISHES Device Fingerprint', 2, 2);
                const canvasData = canvas.toDataURL();

                const fingerprint = {
                    canvas: canvasData.substring(0, 50),
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    timestamp: Date.now()
                };

                return btoa(JSON.stringify(fingerprint));
            } catch (e) {
                console.warn('Device fingerprint generation failed:', e);
                return btoa(JSON.stringify({ timestamp: Date.now() }));
            }
        }

        /**
         * Generate CSRF-like request token
         */
        function generateRequestToken() {
            const token = Array.from(crypto.getRandomValues(new Uint8Array(32)))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
            sessionStorage.setItem('ws_request_token', token);
            return token;
        }

        /**
         * Get current request token
         */
        function getRequestToken() {
            let token = sessionStorage.getItem('ws_request_token');
            if (!token) {
                token = generateRequestToken();
            }
            return token;
        }

        /**
         * XSS protection: sanitize input
         */
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }

        /**
         * XSS protection: sanitize and display
         */
        function sanitizeOutput(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Format phone number automatically
         */
        function formatPhoneNumber(value) {
            const digits = value.replace(/\D/g, '');
            if (digits.length <= 3) return digits;
            if (digits.length <= 7) return digits.slice(0, 3) + '-' + digits.slice(3);
            return digits.slice(0, 3) + '-' + digits.slice(3, 7) + '-' + digits.slice(7, 11);
        }

        /**
         * Validate email
         */
        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        /**
         * Validate password requirements
         */
        function validatePasswordRequirements(password) {
            return {
                minLength: password.length >= CONFIG.PASSWORD_REQUIREMENTS.minLength,
                hasUppercase: CONFIG.PASSWORD_REQUIREMENTS.hasUppercase.test(password),
                hasLowercase: CONFIG.PASSWORD_REQUIREMENTS.hasLowercase.test(password),
                hasNumber: CONFIG.PASSWORD_REQUIREMENTS.hasNumber.test(password),
                hasSpecial: CONFIG.PASSWORD_REQUIREMENTS.hasSpecial.test(password)
            };
        }

        /**
         * Calculate password strength
         */
        function calculatePasswordStrength(password) {
            const requirements = validatePasswordRequirements(password);
            const metRequirements = Object.values(requirements).filter(Boolean).length;

            if (metRequirements <= 1) return { strength: 0, level: 'weak', text: '약함', color: '#f44336' };
            if (metRequirements <= 2) return { strength: 33, level: 'fair', text: '보통', color: '#ff9800' };
            if (metRequirements <= 3) return { strength: 66, level: 'good', text: '강함', color: '#4CAF50' };
            return { strength: 100, level: 'strong', text: '매우 강함', color: '#2196F3' };
        }

        /**
         * Validate phone number
         */
        function validatePhone(phone) {
            const digits = phone.replace(/\D/g, '');
            return digits.length === 10 || digits.length === 11;
        }

        /**
         * Show toast notification
         */
        function showToast(type, title, message = '') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icons = {
                success: '✓',
                error: '✕',
                warning: '!',
                info: 'ℹ'
            };

            toast.innerHTML = `
                <div class="toast-icon">${icons[type] || '✓'}</div>
                <div class="toast-content">
                    <div class="toast-title">${sanitizeOutput(title)}</div>
                    ${message ? `<div class="toast-message">${sanitizeOutput(message)}</div>` : ''}
                </div>
            `;

            toastContainer.appendChild(toast);

            // Auto-dismiss
            const timer = setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 4000);
            }, CONFIG.TOAST_DURATION);

            // Allow manual dismiss on click
            toast.addEventListener('click', () => {
                clearTimeout(timer);
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 4000);
            });

            // Update screen reader
            updateScreenReader(`${type}: ${title}${message ? ' - ' + message : ''}`);
        }

        /**
         * Update screen reader content
         */
        function updateScreenReader(message) {
            const srLive = document.getElementById('srLive');
            srLive.textContent = message;
        }

        // ========================================
        // Rate Limiting
        // ========================================

        /**
         * Check if user is rate limited
         */
        function isRateLimited() {
            const lockoutTime = parseInt(localStorage.getItem('ws_rate_limit_lockout') || '0');
            const now = Date.now();
            return lockoutTime > now;
        }

        /**
         * Get remaining lockout time
         */
        function getRemainingLockoutTime() {
            const lockoutTime = parseInt(localStorage.getItem('ws_rate_limit_lockout') || '0');
            const now = Date.now();
            return Math.max(0, lockoutTime - now);
        }

        /**
         * Apply rate limiting
         */
        function applyRateLimit() {
            const attempts = parseInt(localStorage.getItem('ws_rate_limit_attempts') || '0') + 1;
            localStorage.setItem('ws_rate_limit_attempts', attempts);

            let lockoutDuration = 0;
            for (const rule of CONFIG.RATE_LIMIT.ATTEMPTS) {
                if (attempts >= rule.count) {
                    lockoutDuration = rule.lockout;
                }
            }

            if (lockoutDuration > 0) {
                const lockoutTime = Date.now() + lockoutDuration;
                localStorage.setItem('ws_rate_limit_lockout', lockoutTime);
                showRateLimitWarning(lockoutDuration);
                updateScreenReader(`로그인 시도가 초과되었습니다. ${Math.ceil(lockoutDuration / 1000)}초 동안 로그인을 시도할 수 없습니다.`);
            }
        }

        /**
         * Reset rate limiting
         */
        function resetRateLimit() {
            localStorage.setItem('ws_rate_limit_attempts', '0');
            localStorage.setItem('ws_rate_limit_lockout', '0');
            hideRateLimitWarning();
        }

        /**
         * Show rate limit warning
         */
        function showRateLimitWarning(duration) {
            const warning = document.getElementById('rateLimitWarning');
            const countdown = document.getElementById('lockoutCountdown');
            warning.classList.add('show');

            let remaining = Math.ceil(duration / 1000);
            countdown.textContent = `${remaining}초 후에 다시 시도할 수 있습니다.`;

            const timer = setInterval(() => {
                remaining--;
                countdown.textContent = `${remaining}초 후에 다시 시도할 수 있습니다.`;
                if (remaining <= 0) {
                    clearInterval(timer);
                    hideRateLimitWarning();
                }
            }, 1000);
        }

        /**
         * Hide rate limit warning
         */
        function hideRateLimitWarning() {
            const warning = document.getElementById('rateLimitWarning');
            warning.classList.remove('show');
        }

        // ========================================
        // Session Management
        // ========================================

        /**
         * Check session validity
         */
        function checkSession() {
            const token = sessionStorage.getItem(CONFIG.SESSION_STORAGE_KEYS.TOKEN);
            const loginTime = parseInt(sessionStorage.getItem(CONFIG.SESSION_STORAGE_KEYS.LOGIN_TIME) || '0');
            const now = Date.now();

            if (!token || !loginTime) {
                clearSession();
                return false;
            }

            const sessionAge = now - loginTime;
            if (sessionAge > CONFIG.SESSION_DURATION) {
                clearSession();
                showToast('warning', '세션 만료', '다시 로그인해주세요.');
                return false;
            }

            return true;
        }

        /**
         * Clear session
         */
        function clearSession() {
            sessionStorage.removeItem(CONFIG.SESSION_STORAGE_KEYS.TOKEN);
            sessionStorage.removeItem(CONFIG.SESSION_STORAGE_KEYS.USER);
            sessionStorage.removeItem(CONFIG.SESSION_STORAGE_KEYS.LOGIN_TIME);
            clearSessionTimers();
        }

        /**
         * Clear all session timers
         */
        function clearSessionTimers() {
            if (state.sessionRefreshTimer) clearInterval(state.sessionRefreshTimer);
            if (state.sessionWarningTimer) clearTimeout(state.sessionWarningTimer);
            if (state.sessionExpiryTimer) clearTimeout(state.sessionExpiryTimer);
        }

        /**
         * Setup session timers
         */
        function setupSessionTimers() {
            clearSessionTimers();

            // Auto-refresh session
            state.sessionRefreshTimer = setInterval(() => {
                if (checkSession()) {
                    refreshSession();
                }
            }, CONFIG.SESSION_REFRESH_INTERVAL);

            // Warning before expiry
            state.sessionWarningTimer = setTimeout(() => {
                if (checkSession() && !state.sessionWarningShown) {
                    state.sessionWarningShown = true;
                    showSessionExpiryWarning();
                }
            }, CONFIG.SESSION_DURATION - CONFIG.SESSION_WARNING_TIME);

            // Auto-logout
            state.sessionExpiryTimer = setTimeout(() => {
                clearSession();
            }, CONFIG.SESSION_DURATION);
        }

        /**
         * Refresh session token
         */
        async function refreshSession() {
            try {
                const response = await fetch(`${CONFIG.API_BASE}/refresh`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Request-Token': getRequestToken(),
                        'Authorization': `Bearer ${sessionStorage.getItem(CONFIG.SESSION_STORAGE_KEYS.TOKEN)}`
                    },
                    body: JSON.stringify({
                        deviceFingerprint: state.deviceFingerprint
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.token) {
                        sessionStorage.setItem(CONFIG.SESSION_STORAGE_KEYS.TOKEN, data.token);
                        sessionStorage.setItem(CONFIG.SESSION_STORAGE_KEYS.LOGIN_TIME, Date.now());
                        state.sessionWarningShown = false;
                    }
                }
            } catch (error) {
                console.warn('Session refresh failed:', error);
            }
        }

        /**
         * Show session expiry warning
         */
        function showSessionExpiryWarning() {
            showToast('warning', '세션 만료 예정', '5분 후 자동 로그아웃됩니다.', false);

            // Add option to extend session
            const toastContainer = document.getElementById('toastContainer');
            const lastToast = toastContainer.lastChild;
            if (lastToast) {
                lastToast.style.cursor = 'pointer';
                lastToast.onclick = () => {
                    refreshSession();
                    state.sessionWarningShown = false;
                    setupSessionTimers();
                    showToast('success', '세션 연장', '세션이 30분 더 연장되었습니다.');
                    lastToast.remove();
                };
            }
        }

        // ========================================
        // Form Validation
        // ========================================

        /**
         * Validate field with debouncing
         */
        function validateField(fieldId, type = 'text') {
            if (state.validationTimers[fieldId]) {
                clearTimeout(state.validationTimers[fieldId]);
            }

            state.validationTimers[fieldId] = setTimeout(() => {
                const field = document.getElementById(fieldId);
                const value = field.value.trim();
                const messageEl = field.closest('.form-group').querySelector('.validation-message');
                const indicatorEl = field.closest('.input-wrapper').querySelector('.validation-indicator');

                let isValid = false;
                let message = '';

                switch (type) {
                    case 'email':
                        isValid = validateEmail(value) && value.length > 0;
                        message = isValid ? '사용 가능한 이메일입니다' : '유효한 이메일을 입력하세요';
                        break;
                    case 'password':
                        isValid = value.length >= 8;
                        message = isValid ? '비밀번호가 요구사항을 충족합니다' : '8자 이상 입력하세요';
                        break;
                    case 'phone':
                        isValid = validatePhone(value);
                        message = isValid ? '유효한 번호입니다' : '유효한 휴대폰 번호를 입력하세요';
                        break;
                    case 'name':
                        isValid = value.length >= 2;
                        message = isValid ? '유효한 이름입니다' : '2자 이상 입력하세요';
                        break;
                    case 'company':
                        isValid = value.length >= 2;
                        message = isValid ? '유효한 회사명입니다' : '2자 이상 입력하세요';
                        break;
                    default:
                        isValid = value.length > 0;
                }

                // Update field classes
                field.classList.remove('valid', 'invalid');
                if (value.length > 0) {
                    field.classList.add(isValid ? 'valid' : 'invalid');
                }

                // Update indicator
                if (indicatorEl) {
                    indicatorEl.classList.remove('show', 'valid', 'invalid');
                    if (value.length > 0) {
                        indicatorEl.classList.add('show', isValid ? 'valid' : 'invalid');
                        indicatorEl.textContent = isValid ? '✓' : '✕';
                    }
                }

                // Update message
                if (messageEl && value.length > 0) {
                    messageEl.classList.remove('show', 'success', 'error', 'info');
                    messageEl.classList.add('show', isValid ? 'success' : 'error');
                    messageEl.textContent = message;
                } else if (messageEl) {
                    messageEl.classList.remove('show');
                }
            }, CONFIG.VALIDATION_DEBOUNCE);
        }

        /**
         * Check email for duplicates
         */
        async function checkEmailDuplicate(email) {
            try {
                const response = await fetch(`${CONFIG.API_BASE}/check-email`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Request-Token': getRequestToken()
                    },
                    body: JSON.stringify({ email: sanitizeInput(email) })
                });

                const data = await response.json();
                return !data.exists;
            } catch (error) {
                console.warn('Email check failed:', error);
                return true; // Assume valid on error
            }
        }

        /**
         * Update password requirements checklist
         */
        function updatePasswordRequirements(password) {
            const requirements = validatePasswordRequirements(password);
            const requirementEls = document.querySelectorAll('#register-tab .requirement');

            const checks = [
                requirements.minLength,
                requirements.hasLowercase,
                requirements.hasNumber,
                requirements.hasSpecial
            ];

            requirementEls.forEach((el, index) => {
                el.classList.toggle('met', checks[index]);
                el.querySelector('.requirement-icon').textContent = checks[index] ? '✓' : '○';
            });
        }

        /**
         * Update password strength meter
         */
        function updatePasswordStrength(password) {
            const strength = calculatePasswordStrength(password);
            const bar = document.querySelector('#register-tab .strength-bar');
            const text = document.querySelector('#register-tab .strength-text');

            bar.style.width = strength.strength + '%';
            bar.style.backgroundColor = strength.color;
            text.textContent = strength.text;
            text.className = `strength-text ${strength.level}`;
        }

        // ========================================
        // Form Submission
        // ========================================

        /**
         * Handle login form submission
         */
        async function handleLoginSubmit(e) {
            e.preventDefault();

            if (isRateLimited()) {
                const remaining = getRemainingLockoutTime();
                showToast('error', '로그인 차단됨', `${Math.ceil(remaining / 1000)}초 후 다시 시도하세요.`);
                updateScreenReader(`로그인이 ${Math.ceil(remaining / 1000)}초 동안 차단되었습니다.`);
                return;
            }

            const form = document.getElementById('loginForm');
            const email = sanitizeInput(form.email.value.trim());
            const password = form.password.value;
            const rememberMe = form.rememberMe.checked;
            const submitBtn = form.querySelector('button[type="submit"]');

            // Validation
            if (!validateEmail(email) || password.length === 0) {
                showToast('error', '입력 오류', '이메일과 비밀번호를 입력하세요.');
                return;
            }

            // Loading state
            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;
            updateScreenReader('로그인 중입니다. 잠시만 기다려주세요.');

            try {
                const response = await fetch(`${CONFIG.API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Request-Token': getRequestToken()
                    },
                    body: JSON.stringify({
                        email,
                        password,
                        rememberMe,
                        deviceFingerprint: state.deviceFingerprint
                    })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    resetRateLimit();

                    // Store session
                    sessionStorage.setItem(CONFIG.SESSION_STORAGE_KEYS.TOKEN, data.token);
                    sessionStorage.setItem(CONFIG.SESSION_STORAGE_KEYS.USER, JSON.stringify(data.user));
                    sessionStorage.setItem(CONFIG.SESSION_STORAGE_KEYS.LOGIN_TIME, Date.now());

                    // Store for admin compatibility
                    localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.ADMIN_PASSWORD, data.token);

                    // Keep login persistence (30일 로그인 유지)
                    var rememberCheckbox = document.getElementById('rememberMe');
                    if (rememberCheckbox && rememberCheckbox.checked) {
                        localStorage.setItem('ws_keep_login', 'true');
                        localStorage.setItem('ws_token', data.token);
                        localStorage.setItem('ws_user', JSON.stringify(data.user));
                        localStorage.setItem('ws_login_time', Date.now().toString());
                    }

                    // Setup session timers
                    setupSessionTimers();

                    showToast('success', '로그인 성공', `${sanitizeOutput(data.user.name)}님 환영합니다!`);
                    updateScreenReader(`${sanitizeOutput(data.user.name)}님 로그인 되었습니다.`);

                    // Show last login if available
                    if (data.lastLogin) {
                        setTimeout(() => {
                            const lastLoginDate = new Date(data.lastLogin).toLocaleString('ko-KR');
                            showToast('info', '마지막 로그인', lastLoginDate);
                        }, 1000);
                    }

                    // Redirect
                    setTimeout(() => {
                        if (data.user.role === 'superadmin') {
                            window.location.href = '/admin/';
                        } else {
                            window.location.href = '/admin/';
                        }
                    }, 1500);
                } else {
                    applyRateLimit();
                    showToast('error', '로그인 실패', data.message || '이메일 또는 비밀번호가 잘못되었습니다.');
                    updateScreenReader(`로그인 실패: ${data.message || '이메일 또는 비밀번호가 잘못되었습니다.'}`);
                }
            } catch (error) {
                console.error('Login error:', error);
                applyRateLimit();
                showToast('error', '오류 발생', '로그인 중 오류가 발생했습니다. 다시 시도해주세요.');
                updateScreenReader('로그인 중 오류가 발생했습니다.');
            } finally {
                submitBtn.classList.remove('btn-loading');
                submitBtn.disabled = false;
            }
        }

        /**
         * Handle register form submission
         */
        async function handleRegisterSubmit(e) {
            e.preventDefault();

            const form = document.getElementById('registerForm');
            const formData = {
                name: sanitizeInput(form.name.value.trim()),
                email: sanitizeInput(form.email.value.trim()),
                password: form.password.value,
                confirmPassword: form.confirmPassword.value,
                phone: sanitizeInput(form.phone.value.replace(/\D/g, '')),
                company: sanitizeInput(form.company.value.trim()),
                role: form.role.value,
                reason: sanitizeInput(form.reason.value.trim()),
                agreeTerms: form.agreeTerms.checked,
                deviceFingerprint: state.deviceFingerprint
            };

            // Validation
            if (!validateEmail(formData.email)) {
                showToast('error', '입력 오류', '유효한 이메일을 입력하세요.');
                return;
            }

            if (formData.password.length < 8) {
                showToast('error', '입력 오류', '비밀번호는 8자 이상이어야 합니다.');
                return;
            }

            if (formData.password !== formData.confirmPassword) {
                showToast('error', '입력 오류', '비밀번호가 일치하지 않습니다.');
                return;
            }

            if (!validatePhone(formData.phone)) {
                showToast('error', '입력 오류', '유효한 휴대폰 번호를 입력하세요.');
                return;
            }

            if (!formData.agreeTerms) {
                showToast('error', '입력 오류', '이용약관에 동의해주세요.');
                return;
            }

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;
            updateScreenReader('가입 신청 중입니다. 잠시만 기다려주세요.');

            // Check if this is a superadmin email (auto-approve)
            const isSuperAdmin = CONFIG.SUPERADMIN_EMAILS.includes(formData.email.toLowerCase());

            try {
                const response = await fetch(`${CONFIG.API_BASE}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Request-Token': getRequestToken()
                    },
                    body: JSON.stringify({
                        ...formData,
                        autoApprove: isSuperAdmin,
                        requestedRole: isSuperAdmin ? 'superadmin' : 'user'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    if (isSuperAdmin && data.token) {
                        // 슈퍼관리자: 자동 승인, 즉시 로그인
                        window.sessionStorage.setItem(CONFIG.SESSION_STORAGE_KEYS.TOKEN, data.token);
                        window.sessionStorage.setItem(CONFIG.SESSION_STORAGE_KEYS.USER, JSON.stringify(data.user || {
                            name: formData.name,
                            email: formData.email,
                            role: 'superadmin',
                            company: formData.company
                        }));
                        window.sessionStorage.setItem(CONFIG.SESSION_STORAGE_KEYS.LOGIN_TIME, Date.now().toString());
                        setupSessionTimers();

                        showToast('success', '슈퍼관리자 등록 완료', sanitizeOutput(formData.name) + '님, 최고 관리자로 자동 승인되었습니다!');
                        updateScreenReader(sanitizeOutput(formData.name) + '님이 슈퍼관리자로 등록되었습니다.');

                        setTimeout(() => {
                            window.location.href = '/admin/';
                        }, 1500);
                    } else {
                        // 일반 사용자: 승인 대기 화면
                        showPendingScreen();
                        showToast('success', '가입 신청 완료', '관리자 승인 후 이메일로 안내드리겠습니다.');
                        updateScreenReader('가입 신청이 완료되었습니다. 관리자 승인 후 이메일로 안내드리겠습니다.');
                    }
                } else {
                    showToast('error', '가입 실패', data.message || '가입 중 오류가 발생했습니다.');
                    updateScreenReader(`가입 실패: ${data.message || '가입 중 오류가 발생했습니다.'}`);
                }
            } catch (error) {
                console.error('Register error:', error);
                showToast('error', '오류 발생', '가입 중 오류가 발생했습니다. 다시 시도해주세요.');
                updateScreenReader('가입 중 오류가 발생했습니다.');
            } finally {
                submitBtn.classList.remove('btn-loading');
                submitBtn.disabled = false;
            }
        }

        /**
         * Handle forgot password submission
         */
        async function handleForgotPasswordSubmit(e) {
            e.preventDefault();

            const form = document.getElementById('forgotPasswordForm');
            const email = sanitizeInput(form.email.value.trim());
            const submitBtn = form.querySelector('button[type="submit"]');

            if (!validateEmail(email)) {
                showToast('error', '입력 오류', '유효한 이메일을 입력하세요.');
                return;
            }

            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;
            updateScreenReader('재설정 링크를 발송 중입니다.');

            try {
                const response = await fetch(`${CONFIG.API_BASE}/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Request-Token': getRequestToken()
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    closeForgotPasswordModal();
                    showToast('success', '이메일 발송 완료', '비밀번호 재설정 링크를 이메일로 보내드렸습니다.');
                    updateScreenReader('비밀번호 재설정 링크를 이메일로 발송했습니다.');
                } else {
                    showToast('error', '발송 실패', data.message || '이메일 발송 중 오류가 발생했습니다.');
                    updateScreenReader(`발송 실패: ${data.message || '이메일 발송 중 오류가 발생했습니다.'}`);
                }
            } catch (error) {
                console.error('Forgot password error:', error);
                showToast('error', '오류 발생', '이메일 발송 중 오류가 발생했습니다.');
                updateScreenReader('이메일 발송 중 오류가 발생했습니다.');
            } finally {
                submitBtn.classList.remove('btn-loading');
                submitBtn.disabled = false;
            }
        }

        // ========================================
        // UI Interactions
        // ========================================

        /**
         * Switch between tabs
         */
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === `${tabName}-tab`);
            });

            updateScreenReader(`${tabName === 'login' ? '로그인' : '가입'} 탭으로 전환되었습니다.`);
        }

        /**
         * Show pending screen
         */
        function showPendingScreen() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('pendingScreen').classList.add('active');
        }

        /**
         * Go back to login from pending screen
         */
        function goBackToLogin() {
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerForm').reset();
            document.getElementById('pendingScreen').classList.remove('active');
            switchTab('login');
            updateScreenReader('로그인 탭으로 돌아갔습니다.');
        }

        /**
         * Open forgot password modal
         */
        function openForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.add('active');
            document.getElementById('forgotEmail').focus();
            updateScreenReader('비밀번호 찾기 모달을 열었습니다.');
        }

        /**
         * Close forgot password modal
         */
        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('active');
            document.getElementById('forgotPasswordForm').reset();
            updateScreenReader('비밀번호 찾기 모달을 닫았습니다.');
        }

        /**
         * Toggle password visibility
         */
        function togglePasswordVisibility(e) {
            e.preventDefault();
            const target = document.getElementById(e.target.dataset.target);
            const isPassword = target.type === 'password';
            target.type = isPassword ? 'text' : 'password';
            e.target.textContent = isPassword ? '🙈' : '👁️';
            updateScreenReader(`비밀번호 ${isPassword ? '표시됨' : '숨겨짐'}`);
        }

        // ========================================
        // Security & Anti-Debugging
        // ========================================

        /**
         * Disable developer tools and right-click
         */
        function setupSecurityMeasures() {
            // Disable right-click
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });

            // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
            document.addEventListener('keydown', (e) => {
                if (
                    e.key === 'F12' ||
                    (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                    (e.ctrlKey && e.shiftKey && e.key === 'J') ||
                    (e.ctrlKey && e.shiftKey && e.key === 'C')
                ) {
                    e.preventDefault();
                    return false;
                }
            });

            // Disable console warnings
            Object.defineProperty(console, 'log', { value: () => {} });
            Object.defineProperty(console, 'warn', { value: () => {} });
            Object.defineProperty(console, 'error', { value: () => {} });
        }

        // ========================================
        // Initialization
        // ========================================

        /**
         * Initialize application
         */
        function init() {
            // Generate device fingerprint
            state.deviceFingerprint = generateDeviceFingerprint();
            generateRequestToken();

            // Setup security
            setupSecurityMeasures();

            // Check existing session
            if (state.sessionToken) {
                if (checkSession()) {
                    setupSessionTimers();
                    // Optionally redirect or show session status
                    console.info('Active session detected');
                } else {
                    showToast('warning', '세션 만료', '다시 로그인해주세요.');
                }
            }

            // Event listeners - Tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            // Event listeners - Login Form
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', handleLoginSubmit);

            document.getElementById('loginEmail').addEventListener('blur', () => {
                validateField('loginEmail', 'email');
            });

            document.getElementById('loginPassword').addEventListener('input', () => {
                const value = document.getElementById('loginPassword').value;
                if (value.length > 0) {
                    validateField('loginPassword', 'password');
                }
            });

            // Event listeners - Register Form
            const registerForm = document.getElementById('registerForm');
            registerForm.addEventListener('submit', handleRegisterSubmit);

            document.getElementById('registerName').addEventListener('blur', () => {
                validateField('registerName', 'name');
            });

            document.getElementById('registerEmail').addEventListener('blur', async () => {
                validateField('registerEmail', 'email');
                const email = document.getElementById('registerEmail').value.trim();
                if (validateEmail(email)) {
                    const isAvailable = await checkEmailDuplicate(email);
                    const messageEl = document.getElementById('registerEmail').closest('.form-group').querySelector('.validation-message');
                    if (!isAvailable) {
                        messageEl.classList.add('show', 'error');
                        messageEl.textContent = '이미 등록된 이메일입니다';
                    }
                }
            });

            document.getElementById('registerPassword').addEventListener('input', (e) => {
                const value = e.target.value;
                updatePasswordRequirements(value);
                updatePasswordStrength(value);
                if (value.length > 0) {
                    validateField('registerPassword', 'password');
                }
            });

            document.getElementById('registerPasswordConfirm').addEventListener('input', () => {
                const password = document.getElementById('registerPassword').value;
                const confirm = document.getElementById('registerPasswordConfirm').value;
                const messageEl = document.getElementById('registerPasswordConfirm').closest('.form-group').querySelector('.validation-message');

                if (confirm.length > 0) {
                    if (password === confirm) {
                        document.getElementById('registerPasswordConfirm').classList.remove('invalid');
                        document.getElementById('registerPasswordConfirm').classList.add('valid');
                        messageEl.classList.add('show', 'success');
                        messageEl.textContent = '비밀번호가 일치합니다';
                    } else {
                        document.getElementById('registerPasswordConfirm').classList.remove('valid');
                        document.getElementById('registerPasswordConfirm').classList.add('invalid');
                        messageEl.classList.add('show', 'error');
                        messageEl.textContent = '비밀번호가 일치하지 않습니다';
                    }
                }
            });

            document.getElementById('registerPhone').addEventListener('input', (e) => {
                e.target.value = formatPhoneNumber(e.target.value);
                validateField('registerPhone', 'phone');
            });

            document.getElementById('registerCompany').addEventListener('blur', () => {
                validateField('registerCompany', 'company');
            });

            // Event listeners - Password Toggle
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', togglePasswordVisibility);
            });

            // Event listeners - Forgot Password
            document.getElementById('forgotPasswordBtn').addEventListener('click', openForgotPasswordModal);
            document.getElementById('forgotPasswordForm').addEventListener('submit', handleForgotPasswordSubmit);
            document.getElementById('forgotPasswordModal').addEventListener('click', (e) => {
                if (e.target.id === 'forgotPasswordModal') {
                    closeForgotPasswordModal();
                }
            });

            // Event listeners - Enter key
            loginForm.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                    handleLoginSubmit(e);
                }
            });

            registerForm.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                    handleRegisterSubmit(e);
                }
            });

            // Accessibility - Focus management
            document.querySelectorAll('input, select, button').forEach(el => {
                el.addEventListener('focus', () => {
                    el.classList.add('focus-visible');
                });
                el.addEventListener('blur', () => {
                    el.classList.remove('focus-visible');
                });
            });

            console.info('WISHES Auth System initialized successfully');
        }

        // Initialize on DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
<script>
// 아이디 저장 (Save Email) Feature
(function() {
    var LS_KEY = "ws_saved_email";
    var LS_FLAG = "ws_save_email_checked";
    function initSaveEmail() {
        var emailInput = document.getElementById("loginEmail");
        var cb = document.getElementById("saveEmail");
        if (!emailInput || !cb) return;
        try {
            var saved = localStorage.getItem(LS_KEY);
            var flag = localStorage.getItem(LS_FLAG);
            if (saved && flag === "true") {
                emailInput.value = saved;
                cb.checked = true;
            }
        } catch(e) {}
        var form = document.getElementById("loginForm");
        if (form) {
            form.addEventListener("submit", function() {
                try {
                    if (cb.checked) {
                        localStorage.setItem(LS_KEY, emailInput.value);
                        localStorage.setItem(LS_FLAG, "true");
                    } else {
                        localStorage.removeItem(LS_KEY);
                        localStorage.removeItem(LS_FLAG);
                    }
                } catch(e) {}
            });
        }
    }
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initSaveEmail);
    } else {
        initSaveEmail();
    }
})();
</script>
</body>
</html>
