name: CodeQL

# L-sec149 (2026-04-23): GitHub CodeQL 정적 분석 활성화.
#   Dependabot (deps 취약점) 과 병행하여 "자체 코드"의 semgrep 류 패턴을
#   주간 스캔으로 발견하기 위한 워크플로.
#
#   - languages: javascript-typescript (Next 15 + TS 전체 커버)
#   - 트리거: main 푸시, PR, 매주 월요일 03:00 UTC (KST 월요일 12:00)
#   - queries: security-extended (기본 security-and-quality 보다 커버리지 넓음)
#   - 결과: GitHub Security > Code scanning alerts
#
#   참고: Advanced Security 가 유료 플랜에서만 SARIF 업로드를 허용하지만,
#   public repo 는 무료 제공. wishes-hyundo/WISHES 는 public 전제.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 매주 월요일 03:00 UTC (KST 월 12:00).
    # deps bump 이 쌓이는 주초에 돌려 회귀 감지.
    - cron: '0 3 * * 1'

permissions:
  # CodeQL SARIF 업로드에 필요한 최소 권한
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # CodeQL 데이터베이스 초기화.
      # queries: security-extended — OWASP/CWE 커버리지 확장판.
      # config-file 은 두지 않고 기본 경로 규칙 사용 (src/** 자동 포함).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # JS/TS 는 autobuild 생략 가능하지만 명시적으로 두면
      # Next.js 빌드 산출물(.next/**) 까지 스캔에 포함됨.
      # 빌드 실패 시에도 소스 분석은 진행되도록 continue-on-error.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
