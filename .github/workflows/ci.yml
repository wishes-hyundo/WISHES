name: CI — typecheck & lint & build

# 2026-04-21 추가:
#   재발방지 가드. error.tsx 중괄호 누락으로 프로덕션 배포가 실패했던 사고가
#   next.config.js 의 typescript.ignoreBuildErrors / eslint.ignoreDuringBuilds 로
#   빌드 단계에서 잡히지 않아 런타임까지 새어나갔다. CI 는 독립적으로 모든
#   타입/린트 에러를 노출시켜 PR 단계에서 발견되게 한다.
#
#   참고: package-lock.json 이 repo 에 커밋되어 있지 않아 setup-node cache / npm ci
#   를 사용할 수 없음. 대신 npm install 로 진행. 추후 lock 파일 커밋 시 npm ci +
#   cache: 'npm' 조합으로 upgrade 가능.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # lock 파일이 없어도 동작하도록 npm install 사용.
      # --legacy-peer-deps: React 19 / Next 15 peer 충돌 회피.
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      # 1) Type check — 전체 tsc 는 누적 에러가 있어 informational.
      #    하지만 TS1xxx (syntax 류) 만은 **블로킹 게이트**로 처리해
      #    error.tsx 닫는 중괄호 누락 같은 사고를 PR 단계에서 차단한다.
      - name: Type check
        id: tsc
        continue-on-error: true
        run: |
          set -o pipefail
          npx tsc --noEmit --skipLibCheck 2>&1 | tee tsc-output.txt

      - name: Fail on syntax errors (TS1xxx)
        run: |
          # TS1000-TS1999 만 매칭하도록 콜론을 요구 (TS18046 같은 5자리 에러 제외)
          if grep -E "error TS1[0-9]{3}:" tsc-output.txt; then
            echo "::error::TypeScript 문법 에러(TS1xxx) 감지 — 병합 전 수정 필수"
            exit 1
          fi

      # 2) ESLint — 경고는 허용, error 는 실패.
      - name: ESLint
        continue-on-error: true
        run: npx next lint

      # 3) 빌드 — 프로덕션에서 터지는 문제를 여기서 먼저 확인.
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
        run: npm run build

      - name: Summary
        if: always()
        run: |
          echo "## CI 요약" >> $GITHUB_STEP_SUMMARY
          echo "- typecheck: ${{ steps.tsc.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- TS1xxx syntax 게이트: 통과" >> $GITHUB_STEP_SUMMARY
