name: Accessibility & Performance Audit

# L5 (2026-04-21): 프로덕션 사이트 대상 접근성/성능/SEO/best-practices 정기 감사.
#
#   - push 트리거 대신 schedule + workflow_dispatch 사용:
#     Vercel 배포가 끝난 뒤 안정 상태에서 측정해야 점수가 의미 있음.
#     push 훅에 걸면 배포 완료 전(에셋 미사이즈된 상태) 측정되는 플레이크 발생.
#
#   - 4개 핵심 라우트 (/, /listings, /map, /contact) 를 매트릭스로 병렬 측정.
#
#   - 초기엔 assert 를 warn 레벨로만 걸어두고, 2~3 회 baseline 축적 후
#     .lighthouserc.json 에서 error 로 상향 예정.
#
#   - Lighthouse 는 내부적으로 axe-core 를 사용해 WCAG 2 AA 상당 부분을 커버.
#     별도 pa11y-ci 는 현 단계에선 중복이라 붙이지 않음.

on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 00:00 UTC (= 09:00 KST). 주간 회귀 감지에 충분.
    - cron: '0 0 * * 1'

concurrency:
  group: a11y-perf
  cancel-in-progress: false

jobs:
  lighthouse:
    name: Lighthouse — ${{ matrix.route }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - route: home
            url: https://wishes.co.kr/
          - route: listings
            url: https://wishes.co.kr/listings
          - route: map
            url: https://wishes.co.kr/map
          - route: contact
            url: https://wishes.co.kr/contact

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit with Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ matrix.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
          runs: 2  # 중간값 채택해서 분산 완화

      - name: Summary
        if: always()
        run: |
          echo "## ${{ matrix.route }} (${{ matrix.url }})" >> $GITHUB_STEP_SUMMARY
          echo "리포트는 temporary-public-storage 업로드 링크를 참고." >> $GITHUB_STEP_SUMMARY
          echo "초기엔 warn 레벨 — 기준 누적되면 error 로 전환 예정." >> $GITHUB_STEP_SUMMARY
