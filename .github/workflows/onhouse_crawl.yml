name: Onhouse Crawl and Upload
on:
  workflow_dispatch:
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run onhouse crawler
        run: python scripts/onhouse_crawl_gh.py
