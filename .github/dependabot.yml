# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# L-sec144 (2026-04-23): Dependabot — 의존성 취약점 자동 스캔/PR.
#
# 주간 스캔. @types/* 와 dev 전용 deps 는 그룹 PR 로 묶어서 PR 노이즈 축소.
# 보안 update 는 즉시 PR (default).
#
# 활성화 방법: 본 파일이 main 에 merge 되면 GitHub 가 자동 감지.
# 추가로 GitHub repo Settings -> Code security and analysis 에서
#   - Dependency graph: ON
#   - Dependabot alerts: ON
#   - Dependabot security updates: ON
# 을 확인.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: 2
updates:
  # npm deps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      types:
        patterns:
          - "@types/*"
      dev-deps:
        dependency-type: "development"
        exclude-patterns:
          - "@types/*"
      # 보안 patch 는 그룹에서 제외 (개별 PR 유지, 빠른 머지)
    ignore:
      # major version bump 은 수동 검토. patch/minor 만 자동.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions (향후 CI 추가 시 대비)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
